function ModalCobro({ data, clientes, fmtGs, onCobrar, onClose }) {
  const [medioPago,setMedioPago]=useState("Efectivo");
  const [propina,setPropina]=useState(0);
  const [montoCobrado,setMontoCobrado]=useState("");
  const [clienteCC,setClienteCC]=useState(()=>{
    // Si es delivery y el nombre del pedido coincide exacto con un cliente de Cta. Cte., se autocompleta
    if(data.tipo==="delivery"&&data.data.cliente){
      const match=clientes.find(c=>c.nombre.toLowerCase()===data.data.cliente.trim().toLowerCase());
      if(match) return String(match.id);
    }
    return "";
  });
  const items=data.tipo==="mesa"?data.data.pedidos:data.data.items;
  const subtotal=items.reduce((s,i)=>s+i.precio*i.qty,0);
  const envio=data.tipo==="delivery"&&data.data.tipoEntrega==="delivery"?(data.data.costoEnvio||0):0;
  const montoCuenta=subtotal+envio;
  // Propina automática por excedente: solo en mesas (hay mozo a quien asignarla) y solo con tarjeta/transferencia
  const METODOS_PROPINA_EXCEDENTE=["Tarjeta crédito","Tarjeta débito","Transferencia"];
  const aplicaPropinaExcedente = data.tipo==="mesa" && METODOS_PROPINA_EXCEDENTE.includes(medioPago);
  const propinaExcedente = aplicaPropinaExcedente && montoCobrado!==""? Math.max(0,Number(montoCobrado)-montoCuenta) : 0;
  const propinaFinal = aplicaPropinaExcedente ? propinaExcedente : propina;
  const total = aplicaPropinaExcedente ? Math.max(montoCuenta, montoCobrado!==""?Number(montoCobrado):montoCuenta) : (subtotal+propina+envio);
  const esCC=medioPago==="Crédito";
  const seleccionarMedioPago=(mp)=>{
    setMedioPago(mp);
    if(data.tipo==="mesa"&&METODOS_PROPINA_EXCEDENTE.includes(mp)) setMontoCobrado(String(montoCuenta));
  };
  return(<div style={{background:"#1a1d27",borderRadius:14,padding:24,width:380,maxHeight:"90vh",overflowY:"auto"}}>
    <h3 style={{margin:"0 0 4px",color:"#f97316",fontSize:17}}>{data.tipo==="mesa"?`Cobrar Mesa #${data.data.numero}`:`Cobrar — ${data.data.cliente}`}</h3>
    <p style={{margin:"0 0 12px",color:"#6b7280",fontSize:11}}>{data.tipo==="mesa"?`${data.data.comensales} comensales · ${data.data.mozo||""}`:data.data.direccion||""}</p>
    <div style={{marginBottom:12}}>
      {items.map((i,idx)=><div key={idx} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#9ca3af",marginBottom:2}}><span>{i.nombre} x{i.qty}{i.guarnicionElegida?` (${i.guarnicionElegida})`:""}{i.nota?` — ${i.nota}`:""}</span><span>{fmtGs(i.precio*i.qty)}</span></div>)}
      <div style={{borderTop:"1px solid #2a2d3a",marginTop:7,paddingTop:7,display:"flex",justifyContent:"space-between",fontWeight:700,fontSize:13}}><span>Subtotal</span><span>{fmtGs(subtotal)}</span></div>
      {envio>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#a855f7",fontWeight:600,marginTop:4}}><span>🛵 Envío</span><span>{fmtGs(envio)}</span></div>}
    </div>
    {data.tipo==="mesa"&&!aplicaPropinaExcedente&&<div style={{marginBottom:12}}>
      <label style={{fontSize:11,color:"#9ca3af",display:"block",marginBottom:5}}>Propina</label>
      <div style={{display:"flex",gap:5}}>
        {[0,Math.round(subtotal*0.1),Math.round(subtotal*0.15)].map((val,i)=>(
          <button key={i} onClick={()=>setPropina(val)} style={{flex:1,background:propina===val?"#f97316":"#2a2d3a",border:"none",color:propina===val?"#fff":"#9ca3af",borderRadius:7,padding:"7px 2px",cursor:"pointer",fontSize:11,fontWeight:600}}>{i===0?"Sin propina":i===1?"10%":"15%"}</button>
        ))}
      </div>
    </div>}
    {aplicaPropinaExcedente&&<div style={{marginBottom:12,background:"#0f1117",border:"1px solid #22c55e",borderRadius:8,padding:11}}>
      <label style={{fontSize:11,color:"#9ca3af",display:"block",marginBottom:5}}>Monto efectivamente cobrado</label>
      <p style={{margin:"0 0 7px",color:"#6b7280",fontSize:10}}>Cuenta: {fmtGs(montoCuenta)}. Si el cliente paga de más, el excedente se asigna como propina para {data.data.mozo||"el mozo"}.</p>
      <input type="number" value={montoCobrado} onChange={e=>setMontoCobrado(e.target.value)}
        style={{width:"100%",background:"#1a1d27",border:"1px solid #2a2d3a",color:"#e8e8e8",borderRadius:7,padding:"9px 10px",fontSize:16,fontWeight:700,boxSizing:"border-box"}}/>
      {propinaExcedente>0&&<div style={{marginTop:8,color:"#22c55e",fontSize:12,fontWeight:700}}>🎉 Propina detectada: {fmtGs(propinaExcedente)} → para {data.data.mozo||"el mozo"}</div>}
    </div>}
    <div style={{background:"#0f1117",borderRadius:9,padding:11,marginBottom:14,display:"flex",justifyContent:"space-between",fontSize:19,fontWeight:900}}>
      <span>TOTAL</span><span style={{color:esCC?"#ef4444":"#22c55e"}}>{fmtGs(total)}</span>
    </div>
    <div style={{marginBottom:esCC?11:16}}>
      <label style={{fontSize:11,color:"#9ca3af",display:"block",marginBottom:6}}>Medio de pago</label>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
        {MEDIOS_PAGO.map(mp=><button key={mp} onClick={()=>seleccionarMedioPago(mp)} style={{background:medioPago===mp?(mp==="Crédito"?"#ef4444":"#f97316"):"#2a2d3a",border:"none",color:medioPago===mp?"#fff":"#9ca3af",borderRadius:7,padding:"8px 4px",cursor:"pointer",fontSize:11,fontWeight:medioPago===mp?700:400}}>{mp==="Crédito"?"📋 Crédito":mp}</button>)}
      </div>
    </div>
    {esCC&&<div style={{background:"#2e1a0a",border:"1px solid #ef4444",borderRadius:8,padding:11,marginBottom:14}}>
      <label style={{fontSize:11,color:"#ef4444",display:"block",marginBottom:6,fontWeight:700}}>⚠️ Elegí el cliente:</label>
      {clientes.length===0?(
        <p style={{color:"#9ca3af",fontSize:12,margin:0}}>No hay clientes cargados todavía. Agregalos desde Crédito (➕ Nuevo cliente o 📥 Importar CSV).</p>
      ):clienteCC?(
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#0f1117",borderRadius:7,padding:"8px 10px"}}>
          <span style={{fontSize:13,fontWeight:700}}>{clientes.find(c=>String(c.id)===String(clienteCC))?.nombre}</span>
          <button onClick={()=>setClienteCC("")} style={{background:"#2a2d3a",border:"none",color:"#9ca3af",borderRadius:6,padding:"4px 9px",cursor:"pointer",fontSize:11}}>Cambiar</button>
        </div>
      ):(
        <BuscadorClientes clientes={clientes} maxAltura={160} onSeleccionar={c=>setClienteCC(String(c.id))}/>
      )}
    </div>}
    <div style={{display:"flex",gap:8}}>
      <button onClick={onClose} style={{flex:1,background:"#2a2d3a",border:"none",color:"#9ca3af",borderRadius:7,padding:10,cursor:"pointer"}}>Cancelar</button>
      <button onClick={()=>(!esCC||clienteCC)&&onCobrar(medioPago,propinaFinal,clienteCC?Number(clienteCC):null)}
        style={{flex:2,background:esCC?"#ef4444":"#22c55e",border:"none",color:"#fff",borderRadius:7,padding:10,cursor:(!esCC||clienteCC)?"pointer":"not-allowed",fontWeight:800,fontSize:13,opacity:esCC&&!clienteCC?0.4:1}}>
        {esCC?"Registrar como Crédito":"Confirmar cobro"}
      </button>
    </div>
  </div>);
}

function ModalSaldar({ info, fmtGs, onSaldar, onClose }) {
  const [monto,setMonto]=useState(info.pendiente);
  const [medioPago,setMedioPago]=useState("Transferencia");
  const MEDIOS=["Efectivo","Tarjeta débito","Tarjeta crédito","Transferencia","QR / Mercado Pago"];
  return(<div style={{background:"#1a1d27",borderRadius:14,padding:24,width:340}}>
    <h3 style={{margin:"0 0 4px",color:"#22c55e",fontSize:17}}>Registrar pago</h3>
    <p style={{margin:"0 0 14px",color:"#6b7280",fontSize:12}}>{info.nombre} · Pendiente: {fmtGs(info.pendiente)}</p>
    <div style={{marginBottom:12}}>
      <label style={{fontSize:11,color:"#9ca3af",display:"block",marginBottom:4}}>Monto (Gs)</label>
      <input type="number" value={monto} onChange={e=>setMonto(Number(e.target.value))} style={{width:"100%",background:"#0f1117",border:"1px solid #2a2d3a",color:"#e8e8e8",borderRadius:7,padding:"10px 10px",fontSize:18,fontWeight:700,boxSizing:"border-box"}}/>
      <div style={{display:"flex",gap:6,marginTop:6}}>
        <button onClick={()=>setMonto(info.pendiente)} style={{flex:1,background:"#1e3a1e",border:"1px solid #22c55e",color:"#22c55e",borderRadius:6,padding:"5px 0",cursor:"pointer",fontSize:11,fontWeight:700}}>Total {fmtGs(info.pendiente)}</button>
        <button onClick={()=>setMonto(Math.round(info.pendiente/2))} style={{flex:1,background:"#2a2d3a",border:"none",color:"#9ca3af",borderRadius:6,padding:"5px 0",cursor:"pointer",fontSize:11}}>50%</button>
      </div>
    </div>
    <div style={{marginBottom:16}}>
      <label style={{fontSize:11,color:"#9ca3af",display:"block",marginBottom:6}}>Medio de pago</label>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
        {MEDIOS.map(mp=><button key={mp} onClick={()=>setMedioPago(mp)} style={{background:medioPago===mp?"#f97316":"#2a2d3a",border:"none",color:medioPago===mp?"#fff":"#9ca3af",borderRadius:7,padding:"7px 4px",cursor:"pointer",fontSize:11,fontWeight:medioPago===mp?700:400}}>{mp}</button>)}
      </div>
    </div>
    <div style={{display:"flex",gap:8}}>
      <button onClick={onClose} style={{flex:1,background:"#2a2d3a",border:"none",color:"#9ca3af",borderRadius:7,padding:10,cursor:"pointer"}}>Cancelar</button>
      <button onClick={()=>monto>0&&onSaldar(info.clienteId,info.deudaId,monto,medioPago)} style={{flex:2,background:"#22c55e",border:"none",color:"#fff",borderRadius:7,padding:10,cursor:"pointer",fontWeight:800,fontSize:13}}>Confirmar {fmtGs(monto)}</button>
    </div>
  </div>);
}

function ModalAbrirTurno({ fmtGs, onAbrir, onClose }) {
  const [fondo,setFondo]=useState(0);
  return(<div style={{background:"#1a1d27",borderRadius:13,padding:22,width:300}}>
    <h3 style={{margin:"0 0 4px",color:"#22c55e"}}>Abrir turno</h3>
    <p style={{margin:"0 0 14px",color:"#6b7280",fontSize:12}}>Fondo inicial de caja</p>
    <input type="number" value={fondo} onChange={e=>setFondo(Number(e.target.value))} style={{width:"100%",background:"#0f1117",border:"1px solid #2a2d3a",color:"#e8e8e8",borderRadius:7,padding:"11px",fontSize:18,fontWeight:700,boxSizing:"border-box",marginBottom:16}}/>
    <div style={{display:"flex",gap:8}}>
      <button onClick={onClose} style={{flex:1,background:"#2a2d3a",border:"none",color:"#9ca3af",borderRadius:7,padding:10,cursor:"pointer"}}>Cancelar</button>
      <button onClick={()=>onAbrir(fondo)} style={{flex:1,background:"#22c55e",border:"none",color:"#fff",borderRadius:7,padding:10,cursor:"pointer",fontWeight:800}}>Abrir turno</button>
    </div>
  </div>);
}

// ═══════════════════════════════════════════════════════
// BUSCADOR DE CLIENTES — filtro por nombre, lista rápida
// ═══════════════════════════════════════════════════════
function BuscadorClientes({ clientes, onSeleccionar, placeholder, maxAltura }) {
  const [busqueda,setBusqueda]=useState("");
  const filtrados = [...clientes]
    .filter(c=>c.nombre.toLowerCase().includes(busqueda.toLowerCase()))
    .sort((a,b)=>a.nombre.localeCompare(b.nombre,"es"));
  return (
    <div>
      <input placeholder={placeholder||"Buscar por nombre..."} value={busqueda} onChange={e=>setBusqueda(e.target.value)} autoComplete="off"
        style={{width:"100%",background:"#0f1117",border:"1px solid #2a2d3a",color:"#e8e8e8",borderRadius:7,padding:"8px 10px",fontSize:13,boxSizing:"border-box",marginBottom:6}}/>
      <div style={{maxHeight:maxAltura||200,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
        {filtrados.length===0&&<div style={{color:"#4b5563",fontSize:12,textAlign:"center",padding:10}}>Sin resultados</div>}
        {filtrados.map(c=>(
          <button key={c.id} onClick={()=>onSeleccionar(c)} style={{textAlign:"left",background:"#1a1d27",border:"1px solid #2a2d3a",color:"#e8e8e8",borderRadius:6,padding:"7px 10px",cursor:"pointer",fontSize:12}}>
            {c.nombre}{c.telefono?` · ${c.telefono}`:""}
          </button>
        ))}
      </div>
    </div>
  );
}

function StatCard({ label, value, color }) {
  return(<div style={{background:"#1a1d27",border:`1px solid ${color}33`,borderRadius:11,padding:"13px 15px"}}><div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>{label}</div><div style={{fontSize:20,fontWeight:900,color}}>{value}</div></div>);
}

// ═══════════════════════════════════════════════════════
// NUEVO INGREDIENTE DE RECETA
// ═══════════════════════════════════════════════════════
function NuevoIngredienteReceta({ insumos, yaUsados, onAgregar }) {
  const disponibles = insumos.filter(i=>!yaUsados.includes(i.id));
  const [insumoId,setInsumoId]=useState(disponibles[0]?.id||"");
  const [cantidad,setCantidad]=useState("");
  const insumoSel = insumos.find(i=>i.id===Number(insumoId));

  useEffect(() => {
    if(!disponibles.find(i=>i.id===Number(insumoId))){
      setInsumoId(disponibles[0]?.id||"");
    }
  },[yaUsados.length]);

  const confirmar = () => {
    if(!insumoId||!cantidad)return;
    onAgregar(insumoId,cantidad);
    setCantidad("");
  };

  if(disponibles.length===0) return <p style={{color:"#4b5563",fontSize:11}}>Ya agregaste todos los insumos disponibles.</p>;

  return(
    <div style={{display:"flex",gap:6,alignItems:"center",background:"#0f1117",borderRadius:7,padding:"8px"}}>
      <select value={insumoId} onChange={e=>setInsumoId(e.target.value)} style={{flex:1,background:"#1a1d27",border:"1px solid #2a2d3a",color:"#e8e8e8",borderRadius:6,padding:"6px 8px",fontSize:12}}>
        {disponibles.map(i=><option key={i.id} value={i.id}>{i.nombre}</option>)}
      </select>
      <input type="number" step={insumoSel?.unidad==="kg"?0.001:1} placeholder="Cant." value={cantidad} onChange={e=>setCantidad(e.target.value)}
        style={{width:70,background:"#1a1d27",border:"1px solid #2a2d3a",color:"#e8e8e8",borderRadius:6,padding:"6px 8px",fontSize:12}}/>
      <span style={{fontSize:11,color:"#6b7280",minWidth:18}}>{insumoSel?.unidad==="kg"?"kg":"u"}</span>
      <button onClick={confirmar} style={{background:"#22c55e",border:"none",color:"#fff",borderRadius:6,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700}}>+ Agregar</button>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// SECCIÓN COMPRAS DIARIAS — carga escrita o por voz
// ═══════════════════════════════════════════════════════
function parsearDictadoCompra(texto, listaInsumos) {
  const lower = texto.toLowerCase();
  const matchNum = lower.match(/(\d+([.,]\d+)?)/);
  const cantidad = matchNum ? Number(matchNum[1].replace(",",".")) : null;
  const insumo = listaInsumos.find(i=>lower.includes(i.nombre.toLowerCase()));
  return { cantidad, insumoId: insumo?.id || "" };
}

function SeccionCompras({ insumos, empaques, limpieza, compras, onAgregarCompra, ventas, fmtGs, onAgregarItemLista }) {
  const [categoria, setCategoria] = useState("cocina");
  const [itemId,    setItemId]    = useState("");
  const [cantidad,  setCantidad]  = useState("");
  const [costo,     setCosto]     = useState("");
  const [vistaTab,  setVistaTab]  = useState("nueva"); // "nueva" | "hoy" | "mes"
  const [modalNuevoItem, setModalNuevoItem] = useState(false);
  const [nuevoItemNombre, setNuevoItemNombre] = useState("");
  const [nuevoItemUnidad, setNuevoItemUnidad] = useState("unidad");

  const listaActual = categoria==="cocina" ? insumos : categoria==="empaque" ? empaques : limpieza;
  const itemSel = listaActual.find(i=>i.id===Number(itemId));

  // Mes actual en formato YYYY-MM
  const mesActual = new Date().toISOString().slice(0,7);
  const [mesVista, setMesVista] = useState(mesActual);

  const CAT_COLOR = { cocina:"#f97316", empaque:"#3b82f6", limpieza:"#a855f7" };
  const CAT_LABEL = { cocina:"🍳 Cocina", empaque:"📦 Empaques", limpieza:"🧹 Limpieza" };

  const confirmar = () => {
    if(!itemId){ return; }
    onAgregarCompra(itemId, cantidad, costo, categoria);
    setCantidad(""); setCosto(""); setVistaTab("hoy");
  };

  // ── Filtros ──
  const hoyStr = new Date().toLocaleDateString("es-PY");
  const comprasHoy = compras.filter(c=>c.fecha===hoyStr);
  const comprasMes = compras.filter(c=>c.mes===mesVista);

  // ── Totales por categoría ──
  const totalCat = (cat, lista) => lista.filter(c=>c.categoria===cat).reduce((s,c)=>s+(c.costo||0),0);
  const totalMesCocina  = totalCat("cocina",  comprasMes);
  const totalMesEmpaque = totalCat("empaque", comprasMes);
  const totalMesLimpieza= totalCat("limpieza",comprasMes);
  const totalMesCompras = totalMesCocina + totalMesEmpaque + totalMesLimpieza;

  // ── Ventas del mes ──
  const ventasMes = (ventas||[]).filter(v=>v.fecha && v.fecha.split("/").reverse().join("-").startsWith(mesVista) || (v.mes && v.mes===mesVista));
  // Intentar filtrar por mes usando fecha local
  const ventasMesFiltradas = (ventas||[]).filter(v=>{
    if(!v.fecha) return false;
    const partes = v.fecha.split("/"); // dd/mm/yyyy
    if(partes.length===3) return `${partes[2]}-${partes[1].padStart(2,"0")}`===mesVista;
    return false;
  });
  const totalVentasMes = ventasMesFiltradas.reduce((s,v)=>s+v.total,0);
  const gananciaBruta  = totalVentasMes - totalMesCompras;

  // ── Meses disponibles para selector ──
  const mesesDisp = [...new Set(compras.map(c=>c.mes).filter(Boolean))].sort().reverse();
  if(!mesesDisp.includes(mesActual)) mesesDisp.unshift(mesActual);

  const fmtMes = m => { const [y,mo]=m.split("-"); const nombres=["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"]; return `${nombres[Number(mo)]} ${y}`; };

  return(
    <div>
      <h2 style={{margin:"0 0 4px"}}>Compras</h2>
      <p style={{color:"#6b7280",fontSize:12,margin:"0 0 14px"}}>Registrá cada compra con su costo para calcular gastos y ganancias mensualmente.</p>

      {/* Tabs */}
      <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
        {[["nueva","➕ Nueva compra"],["hoy","📋 Hoy"],["mes","📊 Resumen mensual"]].map(([k,l])=>(
          <button key={k} onClick={()=>setVistaTab(k)}
            style={{background:vistaTab===k?"#f97316":"#1a1d27",border:`1px solid ${vistaTab===k?"#f97316":"#2a2d3a"}`,color:vistaTab===k?"#fff":"#9ca3af",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontWeight:700,fontSize:13}}>
            {l}
          </button>
        ))}
      </div>

      {/* ── NUEVA COMPRA ── */}
      {vistaTab==="nueva"&&(
        <div style={{background:"#1a1d27",border:"1px solid #2a2d3a",borderRadius:13,padding:18,marginBottom:14}}>
          <h3 style={{margin:"0 0 14px",fontSize:14}}>Nueva compra</h3>

          {/* Selector de categoría */}
          <div style={{marginBottom:12}}>
            <label style={{fontSize:11,color:"#9ca3af",display:"block",marginBottom:5}}>Categoría</label>
            <div style={{display:"flex",gap:6}}>
              {["cocina","empaque","limpieza"].map(cat=>(
                <button key={cat} onClick={()=>{setCategoria(cat);setItemId("");}}
                  style={{flex:1,background:categoria===cat?CAT_COLOR[cat]:"#2a2d3a",border:"none",color:categoria===cat?"#fff":"#9ca3af",borderRadius:8,padding:"9px 0",cursor:"pointer",fontWeight:700,fontSize:12}}>
                  {CAT_LABEL[cat]}
                </button>
              ))}
            </div>
          </div>

          {/* Botón agregar nuevo item a la lista */}
          <button onClick={()=>setModalNuevoItem(true)}
            style={{background:"transparent",border:`1px dashed ${CAT_COLOR[categoria]}`,color:CAT_COLOR[categoria],borderRadius:7,padding:"6px 12px",cursor:"pointer",fontSize:11,fontWeight:600,marginBottom:12}}>
            ＋ Agregar nuevo producto a la lista de {CAT_LABEL[categoria]}
          </button>

          {/* Modal nuevo item */}
          {modalNuevoItem&&(
            <div style={{background:"#0f1117",border:`1px solid ${CAT_COLOR[categoria]}`,borderRadius:10,padding:14,marginBottom:12}}>
              <div style={{fontWeight:700,fontSize:13,color:CAT_COLOR[categoria],marginBottom:10}}>Nuevo producto — {CAT_LABEL[categoria]}</div>
              <input placeholder="Nombre del producto" value={nuevoItemNombre} onChange={e=>setNuevoItemNombre(e.target.value)}
                style={{width:"100%",background:"#1a1d27",border:"1px solid #2a2d3a",color:"#e8e8e8",borderRadius:7,padding:"9px 10px",fontSize:13,boxSizing:"border-box",marginBottom:8}}/>
              <div style={{display:"flex",gap:6,marginBottom:10}}>
                {["unidad","kg"].map(u=>(
                  <button key={u} onClick={()=>setNuevoItemUnidad(u)}
                    style={{flex:1,background:nuevoItemUnidad===u?CAT_COLOR[categoria]:"#2a2d3a",border:"none",color:nuevoItemUnidad===u?"#fff":"#9ca3af",borderRadius:7,padding:"8px 0",cursor:"pointer",fontWeight:700,fontSize:12}}>
                    {u==="kg"?"Kilos (kg)":"Unidades"}
                  </button>
                ))}
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>{setModalNuevoItem(false);setNuevoItemNombre("");}}
                  style={{flex:1,background:"#2a2d3a",border:"none",color:"#9ca3af",borderRadius:7,padding:9,cursor:"pointer"}}>Cancelar</button>
                <button onClick={()=>{if(!nuevoItemNombre.trim())return;onAgregarItemLista(nuevoItemNombre.trim(),nuevoItemUnidad,categoria);setNuevoItemNombre("");setNuevoItemUnidad("unidad");setModalNuevoItem(false);}}
                  style={{flex:2,background:CAT_COLOR[categoria],border:"none",color:"#fff",borderRadius:7,padding:9,cursor:"pointer",fontWeight:700}}>Guardar en la lista</button>
              </div>
            </div>
          )}

          {/* Selector de item */}
          <div style={{marginBottom:10}}>
            <label style={{fontSize:11,color:"#9ca3af",display:"block",marginBottom:4}}>Producto</label>
            <select value={itemId} onChange={e=>setItemId(e.target.value)}
              style={{width:"100%",background:"#0f1117",border:`1px solid ${CAT_COLOR[categoria]}`,color:"#e8e8e8",borderRadius:7,padding:"10px 10px",fontSize:13,boxSizing:"border-box"}}>
              <option value="">— Elegir producto —</option>
              {[...listaActual].sort((a,b)=>a.nombre.localeCompare(b.nombre,"es")).map(i=>(
                <option key={i.id} value={i.id}>{i.nombre}</option>
              ))}
            </select>
          </div>

          {/* Cantidad y Costo */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            <div>
              <label style={{fontSize:11,color:"#9ca3af",display:"block",marginBottom:4}}>Cantidad {itemSel?.unidad==="kg"?"(kg)":"(unidades)"}</label>
              <input type="number" step={itemSel?.unidad==="kg"?0.001:1} min="0" placeholder="0"
                value={cantidad} onChange={e=>setCantidad(e.target.value)}
                style={{width:"100%",background:"#0f1117",border:"1px solid #2a2d3a",color:"#e8e8e8",borderRadius:7,padding:"10px",fontSize:16,fontWeight:700,boxSizing:"border-box"}}/>
            </div>
            <div>
              <label style={{fontSize:11,color:"#9ca3af",display:"block",marginBottom:4}}>Costo total (Gs)</label>
              <input type="number" min="0" placeholder="0"
                value={costo} onChange={e=>setCosto(e.target.value)}
                style={{width:"100%",background:"#0f1117",border:"1px solid #22c55e",color:"#22c55e",borderRadius:7,padding:"10px",fontSize:16,fontWeight:700,boxSizing:"border-box"}}/>
            </div>
          </div>

          <button onClick={confirmar} disabled={!itemId||!cantidad}
            style={{width:"100%",background:!itemId||!cantidad?"#2a2d3a":"#22c55e",border:"none",color:!itemId||!cantidad?"#4b5563":"#fff",borderRadius:10,padding:13,cursor:!itemId||!cantidad?"default":"pointer",fontWeight:800,fontSize:15}}>
            ✅ Registrar compra
          </button>
        </div>
      )}

      {/* ── COMPRAS DE HOY ── */}
      {vistaTab==="hoy"&&(
        <div>
          <h3 style={{margin:"0 0 12px",fontSize:15}}>Compras de hoy — {hoyStr}</h3>
          {["cocina","empaque","limpieza"].map(cat=>{
            const items = comprasHoy.filter(c=>c.categoria===cat);
            const total = items.reduce((s,c)=>s+(c.costo||0),0);
            if(!items.length) return null;
            return(
              <div key={cat} style={{background:"#1a1d27",border:`1px solid ${CAT_COLOR[cat]}44`,borderRadius:11,padding:14,marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                  <span style={{fontWeight:700,color:CAT_COLOR[cat]}}>{CAT_LABEL[cat]}</span>
                  <span style={{fontWeight:800,color:CAT_COLOR[cat]}}>{fmtGs(total)}</span>
                </div>
                {items.map(c=>(
                  <div key={c.id} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"5px 0",borderBottom:"1px solid #2a2d3a"}}>
                    <span>{c.nombre} — {c.unidad==="kg"?`${c.cantidad.toFixed(3)}kg`:`${c.cantidad} u`}</span>
                    <span style={{color:"#22c55e",fontWeight:700}}>{c.costo?fmtGs(c.costo):"—"}</span>
                  </div>
                ))}
              </div>
            );
          })}
          {comprasHoy.length===0&&<p style={{color:"#4b5563",fontSize:13,textAlign:"center",marginTop:30}}>Sin compras registradas hoy</p>}
          {comprasHoy.length>0&&(
            <div style={{background:"#0f1117",borderRadius:10,padding:12,display:"flex",justifyContent:"space-between",fontWeight:800,fontSize:15}}>
              <span>Total gastado hoy</span>
              <span style={{color:"#ef4444"}}>{fmtGs(comprasHoy.reduce((s,c)=>s+(c.costo||0),0))}</span>
            </div>
          )}
        </div>
      )}

      {/* ── RESUMEN MENSUAL ── */}
      {vistaTab==="mes"&&(
        <div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <h3 style={{margin:0,fontSize:15}}>Resumen mensual</h3>
            <select value={mesVista} onChange={e=>setMesVista(e.target.value)}
              style={{background:"#1a1d27",border:"1px solid #f97316",color:"#f97316",borderRadius:7,padding:"6px 10px",fontSize:13,fontWeight:700}}>
              {mesesDisp.map(m=><option key={m} value={m}>{fmtMes(m)}</option>)}
            </select>
          </div>

          {/* Tarjetas resumen */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10,marginBottom:18}}>
            {[
              {label:"💰 Ventas",   val:totalVentasMes,   color:"#22c55e"},
              {label:"🍳 Cocina",   val:totalMesCocina,   color:"#f97316"},
              {label:"📦 Empaques", val:totalMesEmpaque,  color:"#3b82f6"},
              {label:"🧹 Limpieza", val:totalMesLimpieza, color:"#a855f7"},
              {label:"📤 Total gastos", val:totalMesCompras, color:"#ef4444"},
            ].map(({label,val,color})=>(
              <div key={label} style={{background:"#1a1d27",border:`1px solid ${color}44`,borderRadius:11,padding:13,textAlign:"center"}}>
                <div style={{fontSize:11,color:"#9ca3af",marginBottom:4}}>{label}</div>
                <div style={{fontWeight:900,fontSize:15,color}}>{fmtGs(val)}</div>
              </div>
            ))}
          </div>

          {/* Ganancia bruta */}
          <div style={{background:gananciaBruta>=0?"#0f2a1a":"#2e1a1a",border:`2px solid ${gananciaBruta>=0?"#22c55e":"#ef4444"}`,borderRadius:13,padding:18,marginBottom:18,textAlign:"center"}}>
            <div style={{fontSize:13,color:"#9ca3af",marginBottom:4}}>Ganancia bruta estimada — {fmtMes(mesVista)}</div>
            <div style={{fontWeight:900,fontSize:28,color:gananciaBruta>=0?"#22c55e":"#ef4444"}}>{fmtGs(gananciaBruta)}</div>
            <div style={{fontSize:11,color:"#6b7280",marginTop:6}}>Ventas {fmtGs(totalVentasMes)} − Gastos {fmtGs(totalMesCompras)}</div>
            {totalVentasMes===0&&<div style={{fontSize:11,color:"#f97316",marginTop:6}}>⚠️ Las ventas se registran al cerrar cada mesa o delivery con cobro.</div>}
          </div>

          {/* Detalle por categoría */}
          {["cocina","empaque","limpieza"].map(cat=>{
            const items = comprasMes.filter(c=>c.categoria===cat);
            if(!items.length) return null;
            const totalCatMes = items.reduce((s,c)=>s+(c.costo||0),0);
            return(
              <div key={cat} style={{background:"#1a1d27",border:`1px solid ${CAT_COLOR[cat]}44`,borderRadius:11,padding:14,marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                  <span style={{fontWeight:700,color:CAT_COLOR[cat]}}>{CAT_LABEL[cat]}</span>
                  <span style={{fontWeight:800,color:CAT_COLOR[cat]}}>{fmtGs(totalCatMes)}</span>
                </div>
                {items.map(c=>(
                  <div key={c.id} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",borderBottom:"1px solid #2a2d3a"}}>
                    <span style={{color:"#9ca3af"}}>{c.fecha} · {c.nombre}</span>
                    <span style={{color:"#e8e8e8",fontWeight:600}}>{c.costo?fmtGs(c.costo):"sin costo"}</span>
                  </div>
                ))}
              </div>
            );
          })}
          {comprasMes.length===0&&<p style={{color:"#4b5563",fontSize:13,textAlign:"center",marginTop:20}}>Sin compras registradas en {fmtMes(mesVista)}</p>}
        </div>
      )}
    </div>
  );
}
