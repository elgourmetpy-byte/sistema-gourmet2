// ═══════════════════════════════════════════════════════
function App() {
  const [usuario,      setUsuario]      = useState(null);
  const [loginForm,    setLoginForm]    = useState({usuario:"",pin:""});
  const [loginError,   setLoginError]   = useState("");
  const [usuarios,     setUsuarios]     = useState(USUARIOS);

  const [modalSeleccionMozo, setModalSeleccionMozo]  = useState(false);
  const [horaReloj,    setHoraReloj]    = useState(new Date());

  useEffect(() => {
    const t = setInterval(()=>setHoraReloj(new Date()),1000);
    return () => clearInterval(t);
  },[]);

  const [mesas,        setMesas]        = useState(generarMesas);
  const [carta,        setCarta]        = useState(CARTA_CON_RECETAS);
  const [ventas,       setVentas]       = useState([]);
  const [log,          setLog]          = useState([]);
  const [seccion,      setSeccion]      = useState("mesas");
  const [sectorActivo, setSectorActivo] = useState("salon");
  const [toast,        setToast]        = useState(null);

  const [mesaActiva,   setMesaActiva]   = useState(null);
  const [modalMesa,    setModalMesa]    = useState(null);
  const [modalPago,    setModalPago]    = useState(null);
  const [ticketModal,  setTicketModal]  = useState(null);
  const [catFiltro,    setCatFiltro]    = useState("Todas");
  const [busqueda,     setBusqueda]     = useState("");

  const [pedidosDelivery,  setPedidosDelivery]  = useState([]);
  const [modalDeliveryRap, setModalDeliveryRap] = useState(false);
  const [deliveryRapForm,  setDeliveryRapForm]  = useState({cliente:"",telefono:"",direccion:"",tipoEntrega:"delivery"});
  const [deliveryActivo,   setDeliveryActivo]   = useState(null);
  const [enviosDelivery,   setEnviosDelivery]   = useState([]); // Registro de TODOS los viajes de delivery (con o sin cobro), para llevar el total real de envíos por día

  const [clientes,          setClientes]          = useState([]);
  const [clienteDetalle,    setClienteDetalle]    = useState(null);
  const [modalNuevoCliente, setModalNuevoCliente] = useState(false);
  const [nuevoCliente,      setNuevoCliente]      = useState({nombre:"",telefono:"",direccion:""});
  const [modalSaldar,       setModalSaldar]       = useState(null);

  const [clientesDelivery,  setClientesDelivery]  = useState([]);
  const [modalClientesDelivery, setModalClientesDelivery] = useState(false);
  const [busquedaClienteDelivery, setBusquedaClienteDelivery] = useState("");
  const [busquedaClienteCC, setBusquedaClienteCC] = useState("");
  const [nuevoClienteDelivery,  setNuevoClienteDelivery]  = useState({nombre:"",telefono:"",direccion:""});
  const [modalEditarClienteDelivery, setModalEditarClienteDelivery] = useState(null);
  const [confirmarEliminarClienteDelivery, setConfirmarEliminarClienteDelivery] = useState(null);
  const inputImportarCSVRef = useRef(null);
  const inputImportarCSVCCRef = useRef(null);

  const [modalEditarProducto, setModalEditarProducto] = useState(null);
  const [modalNuevoProducto,  setModalNuevoProducto]  = useState(false);
  const [nuevoProducto,       setNuevoProducto]       = useState({nombre:"",desc:"",precio:"",categoria:"Lomitos",tipo:"plato",guarnicion:false});
  const [confirmarEliminar,   setConfirmarEliminar]   = useState(null);
  const [catMenuFiltro,       setCatMenuFiltro]       = useState("Todas");
  const [modalReceta,         setModalReceta]         = useState(null);

  const [insumos,            setInsumos]            = useState(INSUMOS_INICIALES);
  const [modalNuevoInsumo,   setModalNuevoInsumo]   = useState(false);
  const [nuevoInsumo,        setNuevoInsumo]        = useState({nombre:"",unidad:"kg",stock:"",stockMinimo:""});
  const [modalEditarInsumo,  setModalEditarInsumo]  = useState(null);
  const [confirmarEliminarInsumo, setConfirmarEliminarInsumo] = useState(null);
  const [empaques,           setEmpaques]           = useState(EMPAQUES_INICIALES);
  const [limpieza,           setLimpieza]           = useState(LIMPIEZA_INICIALES);
  const [compras,            setCompras]            = useState([]);

  const [modalCambiarPin, setModalCambiarPin] = useState(null);
  const [pinForm,         setPinForm]         = useState({actual:"",nuevo:"",confirmar:""});

  const [arqueoAbierto, setArqueoAbierto] = useState(null);
  const [modalArqueo,   setModalArqueo]   = useState(false);
  const [declaracion,   setDeclaracion]   = useState({});
  const [denomEfectivo, setDenomEfectivo] = useState({});
  const [observacionArqueo, setObservacionArqueo] = useState("");
  const [umbralArqueo,  setUmbralArqueo]  = useState(15000);
  const [telefonoAlertaArqueo, setTelefonoAlertaArqueo] = useState("");

  // ═══════════════════════════════════════════════════════
  // SINCRONIZACIÓN CON EL SERVIDOR COMPARTIDO
  // Todo lo que está en CLAVES_COMPARTIDAS se guarda en el
  // servidor y se reparte automáticamente a todos los dispositivos.
  // ═══════════════════════════════════════════════════════
  const [conectado, setConectado] = useState(false);
  const [cargandoInicial, setCargandoInicial] = useState(true);
  const serverRevRef = useRef(0);
  const applyingRemoteRef = useRef(false);
  const saveTimeoutRef = useRef(null);

  const CLAVES_COMPARTIDAS = ["mesas","carta","ventas","log","pedidosDelivery","enviosDelivery","clientes","clientesDelivery","insumos","empaques","limpieza","compras","arqueoAbierto","usuarios","umbralArqueo","telefonoAlertaArqueo"];
  const settersCompartidos = {mesas:setMesas,carta:setCarta,ventas:setVentas,log:setLog,pedidosDelivery:setPedidosDelivery,enviosDelivery:setEnviosDelivery,clientes:setClientes,clientesDelivery:setClientesDelivery,insumos:setInsumos,empaques:setEmpaques,limpieza:setLimpieza,compras:setCompras,arqueoAbierto:setArqueoAbierto,usuarios:setUsuarios,umbralArqueo:setUmbralArqueo,telefonoAlertaArqueo:setTelefonoAlertaArqueo};
  const valoresCompartidos = {mesas,carta,ventas,log,pedidosDelivery,enviosDelivery,clientes,clientesDelivery,insumos,empaques,limpieza,compras,arqueoAbierto,usuarios,umbralArqueo,telefonoAlertaArqueo};

  // Carga inicial: trae lo que ya está guardado en el servidor
  useEffect(() => {
    fetch("/api/state").then(r=>r.json()).then(res=>{
      applyingRemoteRef.current = true;
      CLAVES_COMPARTIDAS.forEach(k=>{ if(res.data[k]!==undefined) settersCompartidos[k](res.data[k]); });
      serverRevRef.current = res.rev;
      setConectado(true);
      setCargandoInicial(false);
      setTimeout(()=>{applyingRemoteRef.current=false;},50);
    }).catch(()=>{ setConectado(false); setCargandoInicial(false); });
  },[]);

  // Guarda cambios locales en el servidor (con una pequeña espera para no saturar)
  useEffect(() => {
    if(cargandoInicial||applyingRemoteRef.current) return;
    if(saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
    saveTimeoutRef.current = setTimeout(()=>{
      const payload={}; CLAVES_COMPARTIDAS.forEach(k=>payload[k]=valoresCompartidos[k]);
      fetch("/api/state",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({rev:serverRevRef.current,data:payload})})
        .then(r=>r.json()).then(res=>{serverRevRef.current=res.rev; setConectado(true);})
        .catch(()=>setConectado(false));
    },700);
    return ()=>clearTimeout(saveTimeoutRef.current);
    // eslint-disable-next-line
  },[mesas,carta,ventas,log,pedidosDelivery,enviosDelivery,clientes,clientesDelivery,insumos,empaques,limpieza,compras,arqueoAbierto,usuarios,umbralArqueo,telefonoAlertaArqueo,cargandoInicial]);

  // Revisa cada 4 segundos si otro dispositivo cambió algo
  useEffect(() => {
    const t = setInterval(()=>{
      fetch("/api/state").then(r=>r.json()).then(res=>{
        if(res.rev>serverRevRef.current){
          applyingRemoteRef.current=true;
          CLAVES_COMPARTIDAS.forEach(k=>{ if(res.data[k]!==undefined) settersCompartidos[k](res.data[k]); });
          serverRevRef.current=res.rev;
          setTimeout(()=>{applyingRemoteRef.current=false;},50);
        }
        setConectado(true);
      }).catch(()=>setConectado(false));
    },4000);
    return ()=>clearInterval(t);
  },[]);

  // ── helpers ──────────────────────────────────────────
  const puede = sec => usuario && PERMISOS[usuario.rol]?.includes(sec);
  const esDueno = () => usuario?.rol === "dueno";

  const showToast = (msg, tipo="ok") => {
    setToast({msg,tipo});
    setTimeout(()=>setToast(null),3000);
  };

  const registrarLog = useCallback((accion,detalle="") => {
    setLog(prev=>[{id:Date.now(),usuario:usuario?.nombre||"—",rol:usuario?.rol||"—",accion,detalle,hora:ahora(),fecha:hoy()},...prev]);
  },[usuario]);

  // ── Login ─────────────────────────────────────────────
  const handleLogin = () => {
    const u = usuarios.find(u=>u.usuario===loginForm.usuario&&u.pin===loginForm.pin);
    if (!u){setLoginError("Usuario o PIN incorrecto");return;}
    setUsuario(u);setLoginError("");
    setSeccion(PERMISOS[u.rol][0]);
    showToast(`Bienvenido/a, ${u.nombre}`);
    if(u.rol==="mozo"){ setMozoSesion(null); setModalSeleccionMozo(true); }
  };
  const handleLogout = () => {registrarLog("Salida");setUsuario(null);setLoginForm({usuario:"",pin:""});setMesaActiva(null);setDeliveryActivo(null);setMozoSesion(null);};

  const elegirMozoSesion = (nombre) => {
    setMozoSesion(nombre);
    setModalSeleccionMozo(false);
    registrarLog("Turno de mozo iniciado",nombre);
    showToast(`Turno iniciado: ${nombre}`);
  };

  const cambiarPin = () => {
    if (!pinForm.actual||!pinForm.nuevo||!pinForm.confirmar){showToast("Completá todos los campos","warn");return;}
    if (pinForm.nuevo!==pinForm.confirmar){showToast("Los PINs nuevos no coinciden","err");return;}
    if (pinForm.nuevo.length<4){showToast("El PIN debe tener al menos 4 dígitos","warn");return;}
    const u = usuarios.find(u=>u.id===modalCambiarPin.id&&u.pin===pinForm.actual);
    if (!u){showToast("PIN actual incorrecto","err");return;}
    setUsuarios(prev=>prev.map(uu=>uu.id===u.id?{...uu,pin:pinForm.nuevo}:uu));
    registrarLog("PIN cambiado",u.nombre);
    setModalCambiarPin(null);setPinForm({actual:"",nuevo:"",confirmar:""});
    showToast("PIN actualizado correctamente");
  };

  // ── Mesas ─────────────────────────────────────────────
  const abrirMesa = (mesa,comensales,mozo) => {
    setMesas(prev=>prev.map(m=>m.id===mesa.id?{...m,estado:"ocupada",hora:ahora(),comensales,mozo,pedidos:[],enviados:[]}:m));
    setModalMesa(null);registrarLog("Abrió mesa",`${mesa.sector} #${mesa.numero}`);
    showToast(`Mesa ${mesa.numero} abierta`);
  };

  const agregarItemMesa = (mesaId,item,nota="",guarnicionElegida="") => {
    setMesas(prev=>prev.map(m=>{
      if(m.id!==mesaId)return m;
      const key = `${item.id}|${nota}|${guarnicionElegida}`;
      const existe = m.pedidos.find(p=>p._key===key);
      const nuevos = existe
        ? m.pedidos.map(p=>p._key===key?{...p,qty:p.qty+1}:p)
        : [...m.pedidos,{...item,qty:1,nota,guarnicionElegida,_key:key}];
      return {...m,pedidos:nuevos};
    }));
  };

  const quitarItemMesa = (mesaId,key) => {
    setMesas(prev=>prev.map(m=>{
      if(m.id!==mesaId)return m;
      const item=m.pedidos.find(p=>p._key===key);
      if(!item)return m;
      const nuevos=item.qty===1?m.pedidos.filter(p=>p._key!==key):m.pedidos.map(p=>p._key===key?{...p,qty:p.qty-1}:p);
      return {...m,pedidos:nuevos};
    }));
  };

  const totalMesa = mesa => mesa.pedidos.reduce((s,p)=>s+p.precio*p.qty,0);

  // Ticket incremental — solo ítems NO enviados aún
  const enviarCocina = (mesa) => {
    const yaEnviados = new Set(mesa.enviados||[]);
    const nuevos = mesa.pedidos.filter(p=>!yaEnviados.has(p._key));
    if(!nuevos.length){showToast("No hay ítems nuevos para enviar","warn");return;}
    const itemsCocina = nuevos.filter(p=>p.tipo!=="bebida");
    const itemsBarra  = nuevos.filter(p=>p.tipo==="bebida");
    setTicketModal({tipo:"mesa",sector:SECTORES.find(s=>s.id===mesa.sector)?.nombre,numero:mesa.numero,mozo:mesa.mozo,itemsCocina,itemsBarra,hora:ahora()});
    // Marcar como enviados
    const nuevasKeys = nuevos.map(p=>p._key);
    setMesas(prev=>prev.map(m=>m.id===mesa.id?{...m,enviados:[...(m.enviados||[]),...nuevasKeys]}:m));
    registrarLog("Pedido a cocina",`Mesa ${mesa.sector} #${mesa.numero} · ${nuevos.length} ítems`);
  };

  // ── Descuento automático de stock (bebidas + insumos por receta) ──
  const descontarStockPorVenta = useCallback((items) => {
    // Bebidas: descuentan directamente de su propio stock en la carta
    setCarta(prev=>prev.map(p=>{
      if(p.tipo!=="bebida")return p;
      const vendido=items.filter(i=>i.id===p.id).reduce((s,i)=>s+i.qty,0);
      return vendido>0?{...p,stock:Math.max(0,(p.stock||0)-vendido)}:p;
    }));
    // Insumos: descuentan según la receta de cada plato vendido
    const consumos={};
    items.forEach(it=>{
      if(it.tipo!=="bebida"&&Array.isArray(it.receta)){
        it.receta.forEach(r=>{ consumos[r.insumoId]=(consumos[r.insumoId]||0)+r.cantidad*it.qty; });
      }
    });
    if(Object.keys(consumos).length){
      setInsumos(prev=>prev.map(ins=>consumos[ins.id]?{...ins,stock:Math.max(0,+(ins.stock-consumos[ins.id]).toFixed(3))}:ins));
    }
  },[]);

  const cerrarCuenta = (mesa,medioPago,propina=0,clienteCCId=null) => {
    const total=totalMesa(mesa)+propina;
    descontarStockPorVenta(mesa.pedidos);
    if(medioPago==="Crédito"&&clienteCCId){
      const deuda={id:Date.now(),origen:`Mesa ${SECTORES.find(s=>s.id===mesa.sector)?.nombre} #${mesa.numero}`,items:mesa.pedidos,total,fecha:hoy(),hora:ahora(),estado:"pendiente",pagos:[]};
      setClientes(prev=>prev.map(c=>c.id===clienteCCId?{...c,deudas:[...c.deudas,deuda]}:c));
      registrarLog("Crédito",`Mesa #${mesa.numero} → ${clientes.find(c=>c.id===clienteCCId)?.nombre}`);

  // ── Importar contactos desde CSV (Gmail/Outlook/iCloud) ──
  const parsearCSVContactos = (texto) => {
    const lineas = texto.split(/\r\n|\n|\r/).filter(l=>l.trim().length>0);
    if(lineas.length===0) return [];
    const separador = (lineas[0].split(";").length>lineas[0].split(",").length) ? ";" : ",";
    const partirLinea = (linea) => {
      const partes=[]; let actual=""; let dentroComillas=false;
      for(let i=0;i<linea.length;i++){
        const ch=linea[i];
        if(ch==='"'){ dentroComillas=!dentroComillas; continue; }
        if(ch===separador&&!dentroComillas){ partes.push(actual); actual=""; continue; }
        actual+=ch;
      }
      partes.push(actual);
      return partes.map(p=>p.trim());
    };
    const encabezado = partirLinea(lineas[0]).map(h=>h.toLowerCase().trim());

    // Nombre: columna única "Name"/"Nombre", o combinación First+Middle+Last (Google/Outlook)
    const idxNombreSimple = encabezado.findIndex(h=>h==="name"||h==="nombre"||h==="full name");
    const idxFirst = encabezado.findIndex(h=>h==="first name"||h==="nombre");
    const idxMiddle= encabezado.findIndex(h=>h==="middle name");
    const idxLast  = encabezado.findIndex(h=>h==="last name"||h==="apellido");
    const idxFileAs= encabezado.findIndex(h=>h==="file as");

    // Teléfono: cualquier columna que mencione phone/tel y NO sea una columna "label"
    const idxsTelefono = encabezado
      .map((h,i)=>({h,i}))
      .filter(({h})=>/(phone|tel[eé]fono|tel\b|m[oó]vil|celular|whatsapp)/.test(h) && !/label/.test(h) && !/phonetic/.test(h))
      .map(({i})=>i);

    // Dirección: columna que mencione dirección/address y no sea "label"
    const idxDireccion = encabezado.findIndex(h=>/direcc|address/.test(h) && !/label/.test(h));

    const hayEncabezado = idxNombreSimple>=0||idxFirst>=0||idxLast>=0||idxsTelefono.length>0||idxDireccion>=0;
    const filas = (hayEncabezado?lineas.slice(1):lineas).map(partirLinea);

    return filas.map(cols=>{
      let nombre="";
      if(idxNombreSimple>=0) nombre=cols[idxNombreSimple]||"";
      else if(idxFirst>=0||idxLast>=0) nombre=[idxFirst,idxMiddle,idxLast].filter(i=>i>=0).map(i=>cols[i]||"").join(" ").replace(/\s+/g," ").trim();
      if(!nombre&&idxFileAs>=0) nombre=cols[idxFileAs]||"";
      if(!nombre) nombre=cols[0]||"";

      let telefono="";
      if(idxsTelefono.length){ for(const i of idxsTelefono){ if(cols[i]&&cols[i].trim()){ telefono=cols[i].trim(); break; } } }
      else if(!hayEncabezado) telefono=cols[1]||"";

      const direccion = idxDireccion>=0 ? (cols[idxDireccion]||"") : (!hayEncabezado ? (cols[2]||"") : "");

      return { nombre:nombre.trim(), telefono, direccion };
    }).filter(c=>c.nombre.length>0);
  };

  // Fusiona contactos importados con una lista existente sin perder contactos
  // que comparten nombre pero tienen teléfonos distintos (ej. varios "Ale").
  const fusionarContactosImportados = (listaActual, contactos) => {
    const lista=[...listaActual]; let nuevos=0, actualizados=0, repetidos=0;
    contactos.forEach(c=>{
      const nombreTrim=c.nombre.trim();
      const telTrim=(c.telefono||"").trim();
      const idxExacto=lista.findIndex(x=>x.nombre.toLowerCase()===nombreTrim.toLowerCase()&&(x.telefono||"").trim()===telTrim);
      if(idxExacto>=0){ repetidos++; return; }
      const idxSoloNombre=lista.findIndex(x=>x.nombre.toLowerCase()===nombreTrim.toLowerCase()&&!x.telefono);
      if(idxSoloNombre>=0){
        lista[idxSoloNombre]={...lista[idxSoloNombre],telefono:telTrim||lista[idxSoloNombre].telefono,direccion:lista[idxSoloNombre].direccion||c.direccion||""};
        actualizados++;
      } else {
        lista.push({id:Date.now()+Math.random(),nombre:nombreTrim,telefono:telTrim,direccion:c.direccion||""});
        nuevos++;
      }
    });
    return { lista, nuevos, actualizados, repetidos };
  };

    registrarLog("Compra cargada",`[${cat}] ${item.nombre} +${cant} · Gs ${costoNum.toLocaleString("es-PY")}`);

  // ── Arqueo ────────────────────────────────────────────
  const abrirArqueo=fondo=>{

  };
  const cerrarArqueo=()=>{
    const vt=ventas.filter(v=>v.fecha===hoy());
    const propinasTurno = vt.filter(v=>v.tipo==="mesa"&&v.propina>0);
    const totalPropinas = propinasTurno.reduce((s,v)=>s+v.propina,0);
    const propinasPorMozo = {};
    propinasTurno.forEach(v=>{ const m=v.mozo||"Sin asignar"; propinasPorMozo[m]=(propinasPorMozo[m]||0)+v.propina; });

    const efectivoDeclarado = DENOMINACIONES.reduce((s,d)=>s+d*(denomEfectivo[d]||0),0);
    const declaracionFinal = {...declaracion, Efectivo: efectivoDeclarado};

    const resumen=MEDIOS_PAGO.filter(m=>m!=="Crédito").map(m=>{
      let sistema = vt.filter(v=>v.medioPago===m).reduce((s,v)=>s+v.total,0);
      // El efectivo esperado en caja resta las propinas que ya se le pagaron al mozo en mano
      if(m==="Efectivo") sistema = sistema - totalPropinas;
      return { medio:m, sistema, declarado:declaracionFinal[m]||0 };
    }).filter(r=>r.sistema>0||r.declarado>0).map(r=>({...r,diferencia:r.declarado-r.sistema}));

    const ts=resumen.reduce((s,r)=>s+r.sistema,0),td=resumen.reduce((s,r)=>s+r.declarado,0);
    const dif = td-ts;
    const superaUmbral = Math.abs(dif) > umbralArqueo;

    setArqueoAbierto(prev=>({...prev,cerrado:true,fin:ahora(),cerradoPor:usuario.nombre,cerradoPorRol:usuario.rol,
      resumen,totalSistema:ts,totalDeclarado:td,totalDif:dif,superaUmbral,
      propinasPorMozo,totalPropinas,observacion:observacionArqueo,denomEfectivo:{...denomEfectivo}}));

    // El detalle completo (incluye la diferencia) solo es visible luego en Auditoría, que ya es dueño-only
    registrarLog("Arqueo cerrado",`Declarado: ${fmtGs(td)} · Esperado: ${fmtGs(ts)} · Diferencia: ${fmtGs(dif)}${observacionArqueo?` · Obs: ${observacionArqueo}`:""}`);

    // Al cajero nunca se le muestra el monto esperado ni la diferencia, ni siquiera en el toast
    if(usuario.rol==="dueno"){
      showToast(dif===0?"Caja cuadrada ✅":`Diferencia: ${fmtGs(dif)}`,dif===0?"ok":"warn");
    } else {

    }
  };

  // ── Computados ────────────────────────────────────────
  const cartaFiltrada = carta
    .filter(p=>(catFiltro==="Todas"||p.categoria===catFiltro)&&p.nombre.toLowerCase().includes(busqueda.toLowerCase()))

      const idxA = TODAS_CATEGORIAS.indexOf(a.categoria);
      const idxB = TODAS_CATEGORIAS.indexOf(b.categoria);
      if (idxA !== idxB) return idxA - idxB;
      // Dentro de cada categoría, orden alfabético A-Z por el nombre visible
      return a.nombre.localeCompare(b.nombre, "es", { sensitivity: "base" });

  const cartaMenuFiltrada = carta.filter(p=>(catMenuFiltro==="Todas"||p.categoria===catMenuFiltro));

    return acc;

  const propinasHoy = ventasHoy.filter(v=>v.tipo==="mesa"&&v.propina>0);

              <div style={{display:"flex",gap:12,fontSize:12,color:"#9ca3af"}}>
                <span>🟢 <b style={{color:"#22c55e"}}>{mesas.filter(m=>m.estado==="libre").length}</b></span>

        {/* ══ COMPRAS ══ */}
        {seccion==="compras"&&(
          <SeccionCompras insumos={insumos} empaques={empaques} limpieza={limpieza} compras={compras} onAgregarCompra={agregarCompra} ventas={ventas} fmtGs={fmtGs} onAgregarItemLista={(nombre,unidad,cat)=>{const id=Date.now();if(cat==="cocina")setInsumos(p=>[...p,{id,nombre,unidad,stock:0,stockMinimo:0}]);else if(cat==="empaque")setEmpaques(p=>[...p,{id,nombre,unidad,stock:0,stockMinimo:0}]);else setLimpieza(p=>[...p,{id,nombre,unidad,stock:0,stockMinimo:0}]);showToast(`"${nombre}" agregado a ${cat}`);}} />
        )}

        {/* ══ CAJA ══ */}
        {seccion==="caja"&&(
          <div>
            <h2 style={{margin:"0 0 14px"}}>Caja del día — {hoy()}</h2>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(150px,1fr))",gap:11,marginBottom:20}}>
              <StatCard label="Total del día"  value={fmtGs(totalHoy)}                                    color="#22c55e"/>
              <StatCard label="Ventas"         value={ventasHoy.length}                                   color="#3b82f6"/>
              <StatCard label="Mesas"          value={ventasHoy.filter(v=>v.tipo==="mesa").length}         color="#f97316"/>
              <StatCard label="Delivery"       value={ventasHoy.filter(v=>v.tipo==="delivery").length}     color="#a855f7"/>
              <StatCard label="A pagar Delivery" value={fmtGs(totalEnvioHoy)}                              color="#06b6d4"/>
              <StatCard label="Vendido a crédito hoy" value={fmtGs(totalCreditoHoy)}                       color="#ef4444"/>
            </div>
            {historialEnviosPorDia.length>0&&<div style={{background:"#1a1d27",border:"1px solid #06b6d4",borderRadius:13,padding:16,marginBottom:18}}>
              <h3 style={{margin:"0 0 11px",fontSize:14,color:"#06b6d4"}}>📦 Historial de envíos por día</h3>
              <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:220,overflowY:"auto"}}>
                {historialEnviosPorDia.map(d=>(
                  <div key={d.fecha} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"6px 0",borderBottom:"1px solid #2a2d3a"}}>
                    <span>{d.fecha}{d.fecha===hoy()?" (hoy)":""} · {d.viajes} viaje{d.viajes>1?"s":""}</span>
                    <span style={{fontWeight:700,color:"#06b6d4"}}>{fmtGs(d.total)}</span>
                  </div>
                ))}
              </div>
              <p style={{margin:"10px 0 0",fontSize:10,color:"#6b7280"}}>Incluye todos los viajes de delivery, sin importar el medio de pago (incluso los que quedaron a crédito).</p>
            </div>}
            {ventasCreditoHoy.length>0&&<div style={{background:"#1a1d27",border:"1px solid #ef4444",borderRadius:13,padding:16,marginBottom:18}}>
              <h3 style={{margin:"0 0 11px",fontSize:14,color:"#ef4444"}}>🧾 Ventas a crédito (fiado) de hoy</h3>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {ventasCreditoHoy.map(v=>(
                  <div key={v.id} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"4px 0"}}>
                    <span>{v.tipo==="mesa"?`${SECTORES.find(s=>s.id===v.sector)?.nombre} #${v.mesa}`:v.tipo==="delivery"?`Delivery — ${v.cliente}`:v.cliente||"Cliente"}</span>
                    <span style={{fontWeight:700,color:"#ef4444"}}>{fmtGs(v.total)}</span>
                  </div>
                ))}
                <div style={{borderTop:"1px solid #2a2d3a",marginTop:6,paddingTop:8,display:"flex",justifyContent:"space-between",fontWeight:800,fontSize:14}}><span>Total fiado hoy</span><span style={{color:"#ef4444"}}>{fmtGs(totalCreditoHoy)}</span></div>
              </div>
              <p style={{margin:"10px 0 0",fontSize:10,color:"#6b7280"}}>Este monto no entró como efectivo ni tarjeta — quedó anotado en la cuenta corriente del cliente, en la sección Crédito.</p>
            </div>}
            {porMedioPago.length>0&&<div style={{background:"#1a1d27",border:"1px solid #2a2d3a",borderRadius:13,padding:16,marginBottom:18}}>
              <h3 style={{margin:"0 0 11px",fontSize:14}}>Por medio de pago</h3>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(160px,1fr))",gap:9}}>
                {porMedioPago.map(mp=>{
                  const ocultar = mp.medio==="Efectivo" && usuario.rol!=="dueno";
                  return(<div key={mp.medio} style={{background:"#0f1117",borderRadius:9,padding:11}}>
                    <div style={{fontSize:11,color:"#9ca3af",marginBottom:3}}>{mp.medio}</div>
                    <div style={{fontWeight:800,fontSize:16,color:"#f97316"}}>{ocultar?"🙈 Oculto":fmtGs(mp.total)}</div>
                    <div style={{fontSize:10,color:"#6b7280"}}>{ocultar?"Ver en Arqueo":`${mp.cant} venta${mp.cant>1?"s":""}`}</div>
                  </div>);
                })}
              </div>
            </div>}
            {totalPropinasHoy>0&&<div style={{background:"#1a1d27",border:"1px solid #22c55e",borderRadius:13,padding:16,marginBottom:18}}>
              <h3 style={{margin:"0 0 11px",fontSize:14,color:"#22c55e"}}>💰 Propinas del turno (por excedente en tarjeta/transferencia)</h3>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {Object.entries(propinasPorMozoHoy).map(([mozo,monto])=>(
                  <div key={mozo} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"4px 0"}}><span>{mozo}</span><span style={{fontWeight:700,color:"#22c55e"}}>{fmtGs(monto)}</span></div>
                ))}
                <div style={{borderTop:"1px solid #2a2d3a",marginTop:6,paddingTop:8,display:"flex",justifyContent:"space-between",fontWeight:800,fontSize:14}}><span>Total propinas</span><span style={{color:"#22c55e"}}>{fmtGs(totalPropinasHoy)}</span></div>
              </div>
              <p style={{margin:"10px 0 0",fontSize:10,color:"#6b7280"}}>Este monto se paga en efectivo al mozo al cierre del turno, y ya está restado del efectivo esperado en el Arqueo.</p>
            </div>}
            <div style={{background:"#1a1d27",border:"1px solid #2a2d3a",borderRadius:13,padding:16}}>
              <h3 style={{margin:"0 0 11px",fontSize:14}}>Historial</h3>
              {ventasHoy.length===0?<p style={{color:"#4b5563",fontSize:12}}>Sin ventas hoy</p>:(
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {[...ventasHoy].reverse().map(v=>(
                    <div key={v.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 11px",background:"#0f1117",borderRadius:8}}>
                      <div><div style={{fontWeight:600,fontSize:13}}>{v.tipo==="mesa"?`${SECTORES.find(s=>s.id===v.sector)?.nombre} #${v.mesa}`:v.tipo==="delivery"?`Delivery — ${v.cliente}`:`Pago CC — ${v.cliente}`}</div><div style={{fontSize:10,color:"#6b7280"}}>{v.hora} · {v.medioPago} · {v.cajero}</div></div>
                      <div style={{fontWeight:800,color:"#22c55e",fontSize:14}}>{fmtGs(v.total)}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* ══ ARQUEO ══ */}
        {seccion==="arqueo"&&(
          <div>
            <h2 style={{margin:"0 0 4px"}}>Arqueo de Caja</h2>
            <p style={{color:"#6b7280",fontSize:12,margin:"0 0 18px"}}>Control cruzado entre sistema y caja física.</p>
            {!arqueoAbierto?(
              <div style={{textAlign:"center",padding:50}}>
                <div style={{fontSize:40,marginBottom:10}}>🔒</div>
                <button onClick={()=>setModalArqueo(true)} style={{background:"#22c55e",border:"none",color:"#fff",borderRadius:11,padding:"12px 28px",cursor:"pointer",fontWeight:800,fontSize:14}}>Abrir turno</button>
              </div>
            ):!arqueoAbierto.cerrado?(
              <div>
                <div style={{background:"#1a2e1a",border:"1px solid #22c55e",borderRadius:11,padding:14,marginBottom:18,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><div style={{fontWeight:700,color:"#22c55e"}}>🟢 Turno abierto</div><div style={{fontSize:11,color:"#6b7280"}}>Desde {arqueoAbierto.inicio} · Cajero: {arqueoAbierto.cajero} · Fondo: {fmtGs(arqueoAbierto.fondoInicio)}</div></div>
                  {usuario.rol==="dueno"&&<div style={{fontSize:17,fontWeight:900,color:"#22c55e"}}>{fmtGs(totalHoy)}</div>}
                </div>

                <div style={{background:"#1a1d27",border:"1px solid #2a2d3a",borderRadius:13,padding:18,marginBottom:14}}>
                  <h3 style={{margin:"0 0 4px",fontSize:14}}>Declaración del cajero</h3>
                  {usuario.rol!=="dueno"&&<p style={{margin:"0 0 14px",color:"#a855f7",fontSize:11}}>🙈 Por seguridad, no se muestra el monto que el sistema espera. Contá billete por billete tal cual está físicamente en la caja.</p>}

                  <div style={{background:"#0f1117",borderRadius:9,padding:14,marginBottom:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                      <span style={{fontSize:13,fontWeight:700}}>💵 Efectivo (contar por denominación)</span>
                      {usuario.rol==="dueno"&&<span style={{fontSize:10,color:"#6b7280"}}>Sistema: {fmtGs(ventasHoy.filter(v=>v.medioPago==="Efectivo").reduce((s,v)=>s+v.total,0)-totalPropinasHoy)}</span>}
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(130px,1fr))",gap:8,marginBottom:10}}>
                      {DENOMINACIONES.map(d=>(
                        <div key={d}>
                          <label style={{fontSize:10,color:"#9ca3af",display:"block",marginBottom:3}}>{fmtGs(d)}</label>
                          <input type="number" min="0" placeholder="0" value={denomEfectivo[d]||""} onChange={e=>setDenomEfectivo(p=>({...p,[d]:Number(e.target.value)}))}
                            style={{width:"100%",background:"#1a1d27",border:"1px solid #2a2d3a",color:"#e8e8e8",borderRadius:6,padding:"6px 8px",fontSize:13,fontWeight:700,boxSizing:"border-box"}}/>
                        </div>
                      ))}
                    </div>
                    <div style={{borderTop:"1px solid #2a2d3a",paddingTop:8,display:"flex",justifyContent:"space-between",fontWeight:800,fontSize:14}}>
                      <span>Total contado</span><span style={{color:"#22c55e"}}>{fmtGs(DENOMINACIONES.reduce((s,d)=>s+d*(denomEfectivo[d]||0),0))}</span>
                    </div>
                  </div>

                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(200px,1fr))",gap:9,marginBottom:14}}>
                    {MEDIOS_PAGO.filter(m=>m!=="Crédito"&&m!=="Efectivo").map(m=>{
                      const sv=ventasHoy.filter(v=>v.medioPago===m).reduce((s,v)=>s+v.total,0);
                      return(<div key={m} style={{background:"#0f1117",borderRadius:9,padding:11}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                          <span style={{fontSize:12,fontWeight:600}}>{m}</span>
                          {usuario.rol==="dueno"&&<span style={{fontSize:10,color:"#6b7280"}}>Sistema: {fmtGs(sv)}</span>}
                        </div>
                        <input type="number" placeholder="0" value={declaracion[m]||""} onChange={e=>setDeclaracion(p=>({...p,[m]:Number(e.target.value)}))} style={{width:"100%",background:"#1a1d27",border:"1px solid #2a2d3a",color:"#e8e8e8",borderRadius:7,padding:"8px 9px",fontSize:14,fontWeight:700,boxSizing:"border-box"}}/>
                      </div>);
                    })}
                  </div>

                  <div>
                    <label style={{fontSize:11,color:"#9ca3af",display:"block",marginBottom:4}}>Observación (opcional)</label>
                    <textarea value={observacionArqueo} onChange={e=>setObservacionArqueo(e.target.value)} placeholder="Ej: faltó un vuelto, billete roto, etc."
                      style={{width:"100%",background:"#0f1117",border:"1px solid #2a2d3a",color:"#e8e8e8",borderRadius:7,padding:"8px 10px",fontSize:12,boxSizing:"border-box",resize:"vertical",minHeight:50}}/>
                  </div>
                </div>

                <button onClick={cerrarArqueo} style={{background:"#f97316",border:"none",color:"#fff",borderRadius:11,padding:"12px 26px",cursor:"pointer",fontWeight:800,fontSize:14}}>Cerrar turno y arquear</button>
              </div>
            ):usuario.rol!=="dueno"?(
              <div style={{textAlign:"center",padding:60}}>
                <div style={{fontSize:50,marginBottom:14}}>✅</div>
                <h3 style={{color:"#22c55e",margin:"0 0 6px"}}>Conteo registrado</h3>
                <p style={{color:"#6b7280",fontSize:13}}>Gracias, {usuario.nombre}. Tu declaración de caja quedó guardada y no se puede modificar. El dueño va a revisar el resultado.</p>
              </div>
            ):(
              <div>
                <div style={{background:"#1a1d27",border:"1px solid #2a2d3a",borderRadius:13,padding:20,marginBottom:14}}>
                  <h3 style={{margin:"0 0 4px",fontSize:16}}>Resultado — {arqueoAbierto.fecha}</h3>
                  <p style={{margin:"0 0 14px",color:"#6b7280",fontSize:11}}>Cerrado por: {arqueoAbierto.cerradoPor} ({arqueoAbierto.cerradoPorRol})</p>
                  <div style={{overflowX:"auto"}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                      <thead><tr style={{borderBottom:"1px solid #2a2d3a"}}>{["Medio","Sistema","Declarado","Diferencia"].map(h=><th key={h} style={{padding:"6px 9px",textAlign:"left",color:"#9ca3af",fontWeight:600,fontSize:11}}>{h}</th>)}</tr></thead>
                      <tbody>
                        {arqueoAbierto.resumen?.map(r=><tr key={r.medio} style={{borderBottom:"1px solid #1a1d27"}}><td style={{padding:"8px 9px",fontWeight:600}}>{r.medio}</td><td style={{padding:"8px 9px",color:"#9ca3af"}}>{fmtGs(r.sistema)}</td><td style={{padding:"8px 9px"}}>{fmtGs(r.declarado)}</td><td style={{padding:"8px 9px",fontWeight:700,color:r.diferencia===0?"#22c55e":r.diferencia>0?"#3b82f6":"#ef4444"}}>{r.diferencia===0?"✅":r.diferencia>0?`+${fmtGs(r.diferencia)}`:`${fmtGs(r.diferencia)}`}</td></tr>)}
                        <tr style={{borderTop:"2px solid #2a2d3a",background:"#0f1117"}}><td style={{padding:"10px 9px",fontWeight:800}}>TOTAL</td><td style={{padding:"10px 9px",fontWeight:800}}>{fmtGs(arqueoAbierto.totalSistema)}</td><td style={{padding:"10px 9px",fontWeight:800}}>{fmtGs(arqueoAbierto.totalDeclarado)}</td><td style={{padding:"10px 9px",fontWeight:900,fontSize:14,color:arqueoAbierto.totalDif===0?"#22c55e":arqueoAbierto.totalDif>0?"#3b82f6":"#ef4444"}}>{arqueoAbierto.totalDif===0?"✅ Cuadra":arqueoAbierto.totalDif>0?`+${fmtGs(arqueoAbierto.totalDif)} sobrante`:`${fmtGs(arqueoAbierto.totalDif)} FALTANTE`}</td></tr>
                      </tbody>
                    </table>
                  </div>
                  <p style={{margin:"10px 0 0",fontSize:10,color:"#6b7280"}}>El efectivo "Sistema" ya tiene restadas las propinas pagadas en mano ({fmtGs(arqueoAbierto.totalPropinas||0)}).</p>
                  {arqueoAbierto.observacion&&<div style={{background:"#0f1117",borderRadius:9,padding:11,marginTop:12}}><div style={{fontSize:10,color:"#9ca3af",marginBottom:3}}>Observación del cajero:</div><div style={{fontSize:12}}>{arqueoAbierto.observacion}</div></div>}
                  {arqueoAbierto.totalDif<0&&<div style={{background:"#2e1a1a",border:"1px solid #ef4444",borderRadius:9,padding:"11px 14px",marginTop:12,color:"#ef4444",fontWeight:700,fontSize:13}}>⚠️ Faltante de {fmtGs(Math.abs(arqueoAbierto.totalDif))}. Revisá la auditoría.</div>}
                  {arqueoAbierto.superaUmbral&&(
                    <div style={{background:"#2e1a0a",border:"1px solid #f97316",borderRadius:9,padding:"11px 14px",marginTop:12}}>
                      <div style={{color:"#f97316",fontWeight:700,fontSize:13,marginBottom:8}}>⚠️ La diferencia supera el umbral configurado ({fmtGs(umbralArqueo)})</div>
                      <button onClick={enviarAlertaArqueoWhatsApp} style={{background:"#25d366",border:"none",color:"#fff",borderRadius:7,padding:"9px 16px",cursor:"pointer",fontWeight:700,fontSize:12}}>📲 Enviar alerta por WhatsApp</button>
                    </div>
                  )}
                </div>

                {Object.keys(arqueoAbierto.propinasPorMozo||{}).length>0&&(
                  <div style={{background:"#1a1d27",border:"1px solid #22c55e",borderRadius:13,padding:18,marginBottom:14}}>
                    <h3 style={{margin:"0 0 11px",fontSize:14,color:"#22c55e"}}>💰 Propinas del turno</h3>
                    <div style={{display:"flex",flexDirection:"column",gap:6}}>
                      {Object.entries(arqueoAbierto.propinasPorMozo).map(([mozo,monto])=>(
                        <div key={mozo} style={{display:"flex",justifyContent:"space-between",fontSize:13}}><span>{mozo}</span><span style={{fontWeight:700}}>{fmtGs(monto)}</span></div>
                      ))}
                      <div style={{borderTop:"1px solid #2a2d3a",marginTop:4,paddingTop:8,display:"flex",justifyContent:"space-between",fontWeight:800,fontSize:14}}><span>Total propinas</span><span style={{color:"#22c55e"}}>{fmtGs(arqueoAbierto.totalPropinas)}</span></div>
                    </div>
                  </div>
                )}

                <button onClick={()=>{setArqueoAbierto(null);setDeclaracion({});setDenomEfectivo({});setObservacionArqueo("");}} style={{background:"#22c55e",border:"none",color:"#fff",borderRadius:11,padding:"11px 24px",cursor:"pointer",fontWeight:700,fontSize:13}}>Nuevo turno</button>
              </div>
            )}
          </div>
        )}
        {modalArqueo&&<ModalOverlay onClose={()=>setModalArqueo(false)}><ModalAbrirTurno fmtGs={fmtGs} onAbrir={abrirArqueo} onClose={()=>setModalArqueo(false)}/></ModalOverlay>}

        {/* ══ AUDITORÍA ══ */}
        {seccion==="auditoria"&&(
          <div>
            <h2 style={{margin:"0 0 4px"}}>Registro de Auditoría</h2>
            <p style={{color:"#6b7280",fontSize:12,margin:"0 0 14px"}}>Todas las acciones del sistema.</p>
            {log.length===0?<div style={{textAlign:"center",color:"#4b5563",marginTop:50}}>Sin acciones</div>:(
              <div style={{background:"#1a1d27",border:"1px solid #2a2d3a",borderRadius:13,overflow:"hidden"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead><tr style={{borderBottom:"1px solid #2a2d3a",background:"#0f1117"}}>{["Hora","Fecha","Usuario","Rol","Acción","Detalle"].map(h=><th key={h} style={{padding:"8px 10px",textAlign:"left",color:"#9ca3af",fontWeight:600,fontSize:10}}>{h}</th>)}</tr></thead>
                  <tbody>{log.map(l=><tr key={l.id} style={{borderBottom:"1px solid #1a1d27"}}><td style={{padding:"8px 10px",color:"#6b7280",whiteSpace:"nowrap"}}>{l.hora}</td><td style={{padding:"8px 10px",color:"#6b7280",whiteSpace:"nowrap"}}>{l.fecha}</td><td style={{padding:"8px 10px",fontWeight:600}}>{l.usuario}</td><td style={{padding:"8px 10px"}}><span style={{background:ROL_COLOR[l.rol]+"22",color:ROL_COLOR[l.rol],borderRadius:20,padding:"1px 7px",fontSize:10,fontWeight:700}}>{l.rol}</span></td><td style={{padding:"8px 10px",fontWeight:600}}>{l.accion}</td><td style={{padding:"8px 10px",color:"#9ca3af"}}>{l.detalle}</td></tr>)}</tbody>
                </table>
              </div>
            )}
          </div>
        )}

        {/* ══ CONFIG ══ */}
        {seccion==="config"&&esDueno()&&(
          <div>
            <h2 style={{margin:"0 0 6px"}}>⚙️ Configuración</h2>
            <p style={{color:"#6b7280",fontSize:13,margin:"0 0 20px"}}>Solo los propietarios pueden modificar los PINs de acceso.</p>
            <div style={{background:"#1a1d27",border:"1px solid #2a2d3a",borderRadius:13,padding:16,marginBottom:18}}>
              <h3 style={{margin:"0 0 11px",fontSize:14}}>Alertas de arqueo</h3>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(220px,1fr))",gap:12}}>
                <div>
                  <label style={{fontSize:11,color:"#9ca3af",display:"block",marginBottom:4}}>Umbral de diferencia para alertar (Gs)</label>
                  <input type="number" value={umbralArqueo} onChange={e=>setUmbralArqueo(Number(e.target.value))} style={{width:"100%",background:"#0f1117",border:"1px solid #2a2d3a",color:"#e8e8e8",borderRadius:7,padding:"8px 10px",fontSize:13,boxSizing:"border-box"}}/>
                </div>
                <div>
                  <label style={{fontSize:11,color:"#9ca3af",display:"block",marginBottom:4}}>WhatsApp para recibir alertas</label>
                  <input value={telefonoAlertaArqueo} onChange={e=>setTelefonoAlertaArqueo(e.target.value)} placeholder="Ej: 0981234567" style={{width:"100%",background:"#0f1117",border:"1px solid #2a2d3a",color:"#e8e8e8",borderRadius:7,padding:"8px 10px",fontSize:13,boxSizing:"border-box"}}/>
                </div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(240px,1fr))",gap:12}}>
              {usuarios.map(u=>(
                <div key={u.id} style={{background:"#1a1d27",border:"1px solid #2a2d3a",borderRadius:13,padding:16}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:14}}>{u.nombre}</div>
                      <div style={{fontSize:11,color:ROL_COLOR[u.rol],fontWeight:600,textTransform:"uppercase"}}>{u.rol}</div>
                      <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>Usuario: <b style={{color:"#e8e8e8"}}>{u.usuario}</b></div>
                    </div>
                    <button onClick={()=>setModalCambiarPin(u)} style={{background:"#2a2d3a",border:"1px solid #f97316",color:"#f97316",borderRadius:8,padding:"7px 12px",cursor:"pointer",fontWeight:700,fontSize:12}}>🔑 Cambiar PIN</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
        {modalCambiarPin&&<ModalOverlay onClose={()=>setModalCambiarPin(null)}>
          <div style={{background:"#1a1d27",borderRadius:13,padding:22,width:320}}>
            <h3 style={{margin:"0 0 4px",color:"#f97316"}}>Cambiar PIN</h3>
            <p style={{margin:"0 0 14px",color:"#6b7280",fontSize:13}}>{modalCambiarPin.nombre}</p>
            {[["PIN actual","actual"],["Nuevo PIN","nuevo"],["Confirmar nuevo PIN","confirmar"]].map(([label,key])=>(
              <div key={key} style={{marginBottom:11}}>
                <label style={{fontSize:11,color:"#9ca3af",display:"block",marginBottom:3}}>{label}</label>
                <input type="password" value={pinForm[key]} onChange={e=>setPinForm(p=>({...p,[key]:e.target.value}))} style={{width:"100%",background:"#0f1117",border:"1px solid #2a2d3a",color:"#e8e8e8",borderRadius:7,padding:"9px 10px",fontSize:14,boxSizing:"border-box"}}/>
              </div>
            ))}
            <div style={{display:"flex",gap:8,marginTop:6}}>
              <button onClick={()=>setModalCambiarPin(null)} style={{flex:1,background:"#2a2d3a",border:"none",color:"#9ca3af",borderRadius:8,padding:10,cursor:"pointer"}}>Cancelar</button>
              <button onClick={cambiarPin} style={{flex:1,background:"#f97316",border:"none",color:"#fff",borderRadius:8,padding:10,cursor:"pointer",fontWeight:700}}>Guardar PIN</button>
            </div>
          </div>
        </ModalOverlay>}

      </div>

      {modalPago&&<ModalOverlay onClose={()=>setModalPago(null)}><ModalCobro data={modalPago} clientes={clientes} fmtGs={fmtGs}
        onCobrar={(mp,prop,ccId)=>{if(modalPago.tipo==="mesa")cerrarCuenta(modalPago.data,mp,prop,ccId);else cerrarDelivery(modalPago.data,mp,ccId);}}
        onClose={()=>setModalPago(null)}/></ModalOverlay>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// DETALLE MESA
// ═══════════════════════════════════════════════════════
function DetalleMesa({ mesa, carta, cartaFiltrada, catFiltro, setCatFiltro, busqueda, setBusqueda, todasCategorias, totalMesa, fmtGs, sectorNombre, sectorColor, onVolver, onAgregarItem, onQuitarItem, onEnviarCocina, onPedirCuenta, onCobrar, puedeCobrar }) {
  const hayNuevos = mesa.pedidos.some(p=>!(mesa.enviados||[]).includes(p._key));
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        <button onClick={onVolver} style={{background:"#2a2d3a",border:"none",color:"#9ca3af",borderRadius:7,padding:"7px 11px",cursor:"pointer",fontSize:12}}>← Volver</button>
        <h2 style={{margin:0,color:sectorColor||"#f97316",fontSize:18}}>{sectorNombre} — Mesa #{mesa.numero}</h2>
        <span style={{color:"#6b7280",fontSize:11}}>{mesa.comensales}👤 · {mesa.mozo||"Sin mozo"} · {mesa.hora}</span>
        <div style={{marginLeft:"auto",display:"flex",gap:6}}>
          {hayNuevos&&<button onClick={onEnviarCocina} style={{background:"#f97316",border:"none",color:"#fff",borderRadius:7,padding:"8px 12px",cursor:"pointer",fontWeight:700,fontSize:12}}>🖨 Cocina</button>}
          <button onClick={onPedirCuenta} style={{background:"#ef4444",border:"none",color:"#fff",borderRadius:7,padding:"8px 11px",cursor:"pointer",fontWeight:600,fontSize:12}}>Pedir cuenta</button>
          {puedeCobrar?<button onClick={onCobrar} style={{background:"#22c55e",border:"none",color:"#fff",borderRadius:7,padding:"8px 13px",cursor:"pointer",fontWeight:700,fontSize:12}}>Cobrar {fmtGs(totalMesa(mesa))}</button>
          :<span style={{background:"#1a1d27",border:"1px solid #2a2d3a",color:"#6b7280",borderRadius:7,padding:"8px 13px",fontSize:11}}>🔒 Solo caja puede cobrar</span>}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 310px",gap:14}}>
        {/* Menú */}
        <div>
          <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
            <input placeholder="Buscar..." value={busqueda} onChange={e=>setBusqueda(e.target.value)} style={{background:"#1a1d27",border:"1px solid #2a2d3a",color:"#e8e8e8",borderRadius:7,padding:"6px 10px",fontSize:11,flex:1,minWidth:100}}/>
            <select value={catFiltro} onChange={e=>setCatFiltro(e.target.value)} style={{background:"#0f1117",border:"1px solid #2a2d3a",color:"#e8e8e8",borderRadius:7,padding:"6px 10px",fontSize:11}}>
              {todasCategorias.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div style={{marginBottom:10}}>
            <BotonExtra onAgregar={(item,nota)=>onAgregarItem(item,nota,"")}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(145px,1fr))",gap:7}}>
            {cartaFiltrada.map(item=>{
              const sinStock=item.tipo==="bebida"&&(item.stock||0)===0;
              return(<ItemButton key={item.id} item={item} sinStock={sinStock} fmtGs={fmtGs} onAgregar={(nota,gua)=>onAgregarItem(item,nota,gua)}/>);
            })}
          </div>
        </div>
        {/* Pedido */}
        <div style={{background:"#1a1d27",border:"1px solid #2a2d3a",borderRadius:12,padding:13}}>
          <h3 style={{margin:"0 0 11px",fontSize:14}}>Pedido</h3>
          {mesa.pedidos.length===0?(<p style={{color:"#4b5563",fontSize:12,textAlign:"center",marginTop:28}}>Seleccioná ítems</p>):(
            <>
              {mesa.pedidos.map(p=>{
                const enviado=(mesa.enviados||[]).includes(p._key);
                return(<div key={p._key} style={{display:"flex",alignItems:"flex-start",gap:5,marginBottom:8,opacity:enviado?0.5:1}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:11,fontWeight:600}}>{p.nombre}{enviado&&<span style={{color:"#22c55e",fontSize:9,marginLeft:4}}>✓enviado</span>}</div>
                    {p.guarnicionElegida&&<div style={{fontSize:9,color:"#22c55e"}}>+ {p.guarnicionElegida}</div>}
                    {p.nota&&<div style={{fontSize:9,color:"#a855f7"}}>📝 {p.nota}</div>}
                    <div style={{fontSize:10,color:"#9ca3af"}}>{fmtGs(p.precio)} c/u</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:3}}>
                    <button onClick={()=>onQuitarItem(p._key)} style={{background:"#2a2d3a",border:"none",color:"#e8e8e8",width:22,height:22,borderRadius:5,cursor:"pointer",fontSize:13}}>−</button>
                    <span style={{minWidth:16,textAlign:"center",fontWeight:700,fontSize:12}}>{p.qty}</span>
                    <button onClick={()=>onAgregarItem(p,p.nota||"",p.guarnicionElegida||"")} style={{background:"#f97316",border:"none",color:"#fff",width:22,height:22,borderRadius:5,cursor:"pointer",fontSize:13}}>+</button>
                  </div>
                  <div style={{minWidth:52,textAlign:"right",fontWeight:700,color:"#f97316",fontSize:11}}>{fmtGs(p.precio*p.qty)}</div>
                </div>);
              })}
              <div style={{borderTop:"1px solid #2a2d3a",marginTop:10,paddingTop:10,display:"flex",justifyContent:"space-between",fontSize:15,fontWeight:800}}><span>Total</span><span style={{color:"#22c55e"}}>{fmtGs(totalMesa(mesa))}</span></div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// ITEM BUTTON — con modal de guarnición/nota
// ═══════════════════════════════════════════════════════
function ItemButton({ item, sinStock, fmtGs, onAgregar }) {
  const [modal, setModal] = useState(false);
  const [nota,  setNota]  = useState("");
  const [gua,   setGua]   = useState(GUARNICIONES_ESTANDAR[0]);

  const necesitaModal = item.guarnicion || false;

  const handleClick = () => {
    if(sinStock)return;
    if(necesitaModal){ setModal(true); return; }
    onAgregar("","");
  };

  const abrirConNota = (e) => {
    e.stopPropagation();
    if(sinStock)return;
    setModal(true);
  };

  const confirmar = () => { onAgregar(nota, item.guarnicion?gua:""); setModal(false); setNota(""); };

  return(
    <div style={{position:"relative"}}>
      <button onClick={handleClick} style={{width:"100%",background:sinStock?"#1a1a1a":"#1a1d27",border:`1px solid ${item.tipo==="guarnicion"?"#22c55e44":"#2a2d3a"}`,borderRadius:8,padding:9,cursor:sinStock?"not-allowed":"pointer",textAlign:"left",color:sinStock?"#4b5563":"#e8e8e8"}}>
        <div style={{fontWeight:600,fontSize:11,marginBottom:2,paddingRight:16}}>{item.nombre}</div>
        {item.desc&&<div style={{fontSize:9,color:"#6b7280",marginBottom:2,lineHeight:1.3}}>{item.desc.length>50?item.desc.slice(0,50)+"...":item.desc}</div>}
        <div style={{color:"#f97316",fontWeight:700,fontSize:12}}>{fmtGs(item.precio)}</div>
        {item.tipo==="bebida"&&<div style={{fontSize:9,color:sinStock?"#ef4444":"#6b7280",marginTop:1}}>{sinStock?"Sin stock":`Stock: ${item.stock}`}</div>}
        {item.guarnicion&&<div style={{fontSize:9,color:"#22c55e",marginTop:1}}>Elegir guarnición</div>}
      </button>
      {!necesitaModal&&!sinStock&&(
        <button onClick={abrirConNota} title="Agregar con nota especial" style={{position:"absolute",top:5,right:5,background:"#0f1117",border:"1px solid #2a2d3a",color:"#a855f7",borderRadius:5,width:18,height:18,fontSize:9,cursor:"pointer",lineHeight:1,padding:0}}>📝</button>
      )}
      {modal&&(
        <div onClick={()=>setModal(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,padding:12}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#1a1d27",borderRadius:13,padding:22,width:340}}>
            <h3 style={{margin:"0 0 4px",color:"#f97316",fontSize:15}}>{item.nombre}</h3>
            {item.desc&&<p style={{margin:"0 0 14px",color:"#6b7280",fontSize:12}}>{item.desc}</p>}
            {item.guarnicion&&(
              <div style={{marginBottom:14}}>
                <label style={{fontSize:11,color:"#9ca3af",display:"block",marginBottom:6}}>Guarnición incluida</label>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {GUARNICIONES_ESTANDAR.map(g=><button key={g} onClick={()=>setGua(g)} style={{background:gua===g?"#22c55e":"#2a2d3a",border:"none",color:gua===g?"#fff":"#9ca3af",borderRadius:7,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:gua===g?700:400}}>{g}</button>)}
                </div>
              </div>
            )}
            <div style={{marginBottom:14}}>
              <label style={{fontSize:11,color:"#9ca3af",display:"block",marginBottom:4}}>Nota especial (opcional)</label>
              <textarea value={nota} onChange={e=>setNota(e.target.value)} placeholder="Ej: sin sal, bien cocido, aparte..."
                style={{width:"100%",background:"#0f1117",border:"1px solid #2a2d3a",color:"#e8e8e8",borderRadius:7,padding:"8px 10px",fontSize:12,boxSizing:"border-box",resize:"vertical",minHeight:60}}/>
            </div>
            <div style={{display:"flex",gap:7}}>
              <button onClick={()=>setModal(false)} style={{flex:1,background:"#2a2d3a",border:"none",color:"#9ca3af",borderRadius:7,padding:9,cursor:"pointer",fontSize:12}}>Cancelar</button>
              <button onClick={confirmar} style={{flex:2,background:"#f97316",border:"none",color:"#fff",borderRadius:7,padding:9,cursor:"pointer",fontWeight:700,fontSize:13}}>Agregar al pedido</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// BOTÓN EXTRA / ADICIONAL — cargos fuera de la carta
// ═══════════════════════════════════════════════════════
function BotonExtra({ onAgregar }) {
  const [modal,setModal]=useState(false);
  const [nombre,setNombre]=useState("");
  const [precio,setPrecio]=useState("");
  const [nota,setNota]=useState("");

  const confirmar = () => {
    if(!nombre||!precio)return;
    onAgregar({id:`extra-${Date.now()}`,nombre,precio:Number(precio),tipo:"extra"},nota);
    setNombre("");setPrecio("");setNota("");setModal(false);
  };

  return(
    <>
      <button onClick={()=>setModal(true)} style={{width:"100%",background:"#1a1d27",border:"1px dashed #f97316",color:"#f97316",borderRadius:8,padding:"8px 10px",cursor:"pointer",fontWeight:700,fontSize:12}}>+ Adicional / Extra fuera de carta</button>
      {modal&&(
        <div onClick={()=>setModal(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,padding:12}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#1a1d27",borderRadius:13,padding:22,width:320}}>
            <h3 style={{margin:"0 0 4px",color:"#f97316",fontSize:15}}>Adicional / Extra</h3>
            <p style={{margin:"0 0 14px",color:"#6b7280",fontSize:12}}>Para cargos que no están en la carta (ej: vaso roto, triple peperoni, etc.)</p>
            <div style={{marginBottom:10}}>
              <label style={{fontSize:11,color:"#9ca3af",display:"block",marginBottom:3}}>Descripción</label>
              <input value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Ej: Vaso roto" style={{width:"100%",background:"#0f1117",border:"1px solid #2a2d3a",color:"#e8e8e8",borderRadius:7,padding:"8px 10px",fontSize:13,boxSizing:"border-box"}}/>
            </div>
            <div style={{marginBottom:10}}>
              <label style={{fontSize:11,color:"#9ca3af",display:"block",marginBottom:3}}>Monto (Gs)</label>
              <input type="number" value={precio} onChange={e=>setPrecio(e.target.value)} placeholder="0" style={{width:"100%",background:"#0f1117",border:"1px solid #2a2d3a",color:"#e8e8e8",borderRadius:7,padding:"8px 10px",fontSize:14,fontWeight:700,boxSizing:"border-box"}}/>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:11,color:"#9ca3af",display:"block",marginBottom:3}}>Nota (opcional)</label>
              <input value={nota} onChange={e=>setNota(e.target.value)} placeholder="Detalle adicional" style={{width:"100%",background:"#0f1117",border:"1px solid #2a2d3a",color:"#e8e8e8",borderRadius:7,padding:"8px 10px",fontSize:13,boxSizing:"border-box"}}/>
            </div>
            <div style={{display:"flex",gap:7}}>
              <button onClick={()=>setModal(false)} style={{flex:1,background:"#2a2d3a",border:"none",color:"#9ca3af",borderRadius:7,padding:9,cursor:"pointer",fontSize:12}}>Cancelar</button>
              <button onClick={confirmar} style={{flex:2,background:"#f97316",border:"none",color:"#fff",borderRadius:7,padding:9,cursor:"pointer",fontWeight:700,fontSize:13}}>Agregar</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

function TicketCocina({ ticket, restaurante, fmtGs, onClose }) {
  const esSVF = ticket.tipo==="svf";
  const [escala,setEscala] = useState(1.2);
  const piePagina = FRASES[Math.floor(Math.random()*FRASES.length)];
  return(
    <div style={{background:"#fff",color:"#000",borderRadius:12,padding:22,width:330,fontFamily:"monospace",maxHeight:"90vh",overflowY:"auto"}}>
      <style>{`@media print { .no-print { display: none !important; } }`}</style>
      <div className="no-print" style={{display:"flex",justifyContent:"center",alignItems:"center",gap:6,marginBottom:10}}>
        <span style={{fontSize:10,color:"#666"}}>Tamaño letra:</span>
        <button onClick={()=>setEscala(e=>Math.max(0.8,+(e-0.2).toFixed(1)))} style={{background:"#eee",border:"1px solid #ccc",borderRadius:5,width:24,height:22,cursor:"pointer",fontSize:11,fontWeight:700}}>A−</button>
        <button onClick={()=>setEscala(1.2)} style={{background:"#eee",border:"1px solid #ccc",borderRadius:5,padding:"2px 7px",cursor:"pointer",fontSize:10}}>Normal</button>
        <button onClick={()=>setEscala(e=>Math.min(2,+(e+0.2).toFixed(1)))} style={{background:"#eee",border:"1px solid #ccc",borderRadius:5,width:24,height:22,cursor:"pointer",fontSize:11,fontWeight:700}}>A+</button>
      </div>
      <div style={{zoom:escala}}>
      {esSVF?(
        <>
          <div style={{textAlign:"center",marginBottom:10}}>
            <div style={{fontWeight:900,fontSize:17}}>{restaurante.nombre}</div>
            <div style={{fontSize:10,color:"#666"}}>{restaurante.direccion}</div>
            <div style={{fontSize:11,color:"#666",marginTop:2}}>{ticket.hora}</div>
          </div>
          <div style={{textAlign:"center",border:"2px solid #000",padding:"6px 0",marginBottom:10}}>
            <div style={{fontWeight:900,fontSize:13}}>⚠ SIN VALOR FISCAL ⚠</div>
          </div>
          {ticket.esDelivery?(
            <>
              <div style={{textAlign:"center",fontWeight:900,fontSize:15,marginBottom:3}}>{ticket.tipoEntrega==="buscan"?"🚶 PASA A BUSCAR":"🛵 DELIVERY"}</div>
              <div style={{textAlign:"center",fontSize:14,fontWeight:700,marginBottom:2}}>{ticket.cliente}</div>
              {ticket.telefono&&<div style={{textAlign:"center",fontSize:11,color:"#555",marginBottom:8}}>{ticket.telefono}</div>}
            </>
          ):(
            <>
              <div style={{textAlign:"center",fontWeight:900,fontSize:16,marginBottom:8}}>{ticket.sector} — Mesa #{ticket.numero}</div>
              {ticket.mozo&&<div style={{textAlign:"center",fontSize:11,color:"#555",marginBottom:8}}>Mozo: {ticket.mozo}</div>}
            </>
          )}
          <div style={{borderTop:"1px dashed #ccc",borderBottom:"1px dashed #ccc",padding:"8px 0",marginBottom:8}}>
            {ticket.items?.map((i,idx)=>(
              <div key={idx} style={{marginBottom:4}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}><span><b>{i.qty}x</b> {i.nombre}{i.guarnicionElegida?` (${i.guarnicionElegida})`:""}</span><span>{fmtGs(i.precio*i.qty)}</span></div>
                {i.nota&&<div style={{fontSize:10,color:"#c00",paddingLeft:14}}>→ {i.nota}</div>}
              </div>
            ))}
            {ticket.envio>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginTop:4}}><span>🛵 Envío</span><span>{fmtGs(ticket.envio)}</span></div>}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontWeight:900,fontSize:16,marginTop:8}}>
            <span>TOTAL</span><span>{fmtGs(ticket.total)}</span>
          </div>
          <div style={{textAlign:"center",marginTop:12,paddingTop:10,borderTop:"1px dashed #ccc",fontSize:11,fontStyle:"italic",color:"#444"}}>
            "{piePagina.texto}"<br/>
            <span style={{fontWeight:700}}>— {piePagina.autor}</span>
          </div>
        </>
      ):(
        <>
          <div style={{textAlign:"center",fontSize:11,color:"#666",fontWeight:700,marginBottom:6}}>{ticket.hora}</div>
          <div style={{borderTop:"2px dashed #ccc",borderBottom:"2px dashed #ccc",padding:"8px 0",marginBottom:8,textAlign:"center"}}>
            {!ticket.esDelivery&&<div style={{fontWeight:900,fontSize:17}}>{ticket.sector} — Mesa #{ticket.numero}</div>}
            {ticket.esDelivery&&<div style={{fontWeight:900,fontSize:14}}>{ticket.tipo==="buscan"?"🚶 PASA A BUSCAR":"🛵 DELIVERY"}</div>}
            {ticket.esDelivery&&<div style={{fontSize:13,fontWeight:700,marginTop:3}}>{ticket.cliente}</div>}
            {ticket.esDelivery&&ticket.telefono&&<div style={{fontSize:11,color:"#555"}}>{ticket.telefono}</div>}
            {!ticket.esDelivery&&ticket.mozo&&<div style={{fontSize:11,color:"#555",marginTop:2}}>Mozo: {ticket.mozo}</div>}
          </div>
          {ticket.itemsCocina?.length>0&&(
            <div style={{marginBottom:8}}>
              <div style={{fontWeight:700,fontSize:12,marginBottom:4,borderBottom:"1px solid #ddd",paddingBottom:2}}>🍳 COCINA</div>
              {ticket.itemsCocina.map((i,idx)=>(
                <div key={idx} style={{marginBottom:5}}>
                  <div style={{fontWeight:700,fontSize:14}}>{i.qty}x {i.nombre.startsWith("½")?<><span style={{color:"#ef4444"}}>½</span>{i.nombre.slice(1)}</>:i.nombre}{i.guarnicionElegida?<span style={{fontWeight:400,fontSize:12}}> — {i.guarnicionElegida}</span>:""}</div>
                  {i.nota&&<div style={{fontSize:11,color:"#c00",paddingLeft:12}}>⚠️ {i.nota}</div>}
                </div>
              ))}
            </div>
          )}
          {ticket.itemsBarra?.length>0&&(
            <div style={{marginBottom:8}}>
              <div style={{fontWeight:700,fontSize:12,marginBottom:4,borderBottom:"1px solid #ddd",paddingBottom:2}}>🥤 BARRA</div>
              {ticket.itemsBarra.map((i,idx)=>(
                <div key={idx} style={{marginBottom:5}}>
                  <div style={{fontWeight:700,fontSize:14}}>{i.qty}x {i.nombre}</div>
                  {i.nota&&<div style={{fontSize:11,color:"#c00",paddingLeft:12}}>⚠️ {i.nota}</div>}
                </div>
              ))}
            </div>
          )}
          {ticket.notas&&<div style={{background:"#fff3cd",border:"1px solid #ffc107",borderRadius:5,padding:"6px 9px",fontSize:11}}><b>📝 Nota:</b> {ticket.notas}</div>}
        </>
      )}

      </div>
      <div className="no-print" style={{textAlign:"center",marginTop:14,display:"flex",gap:8}}>
        <button onClick={()=>window.print()} style={{flex:1,background:"#000",color:"#fff",border:"none",borderRadius:7,padding:"9px 0",cursor:"pointer",fontWeight:700,fontSize:13}}>🖨 Imprimir</button>
        <button onClick={onClose} style={{flex:1,background:"#eee",color:"#333",border:"none",borderRadius:7,padding:"9px 0",cursor:"pointer",fontWeight:600,fontSize:13,marginLeft:8}}>Cerrar</button>
      </div>
    </div>
  );
}
